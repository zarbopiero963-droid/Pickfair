name: Repo API Report V4

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  analyze:
    name: Generate Repository API Report V4
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create artifacts dir
        run: mkdir -p artifacts

      - name: Run repo analyzer
        run: python scripts/repo_api_report_v4.py

      - name: Check report exists
        run: |
          test -f artifacts/repo_api_report_v4.json
          echo "==============================="
          echo "ARTIFACT FILES AFTER REPORT"
          echo "==============================="
          ls -la artifacts

      - name: Generate fix backlog
        run: python scripts/generate_fix_backlog.py

      - name: Check all expected files exist
        run: |
          test -f artifacts/repo_api_report_v4.json
          test -f artifacts/repo_fix_backlog.json
          test -f artifacts/repo_fix_backlog_pretty.md
          echo "==============================="
          echo "FINAL ARTIFACT FILES"
          echo "==============================="
          ls -la artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repo-api-report-v4
          path: |
            artifacts/repo_api_report_v4.json
            artifacts/repo_fix_backlog.json
            artifacts/repo_fix_backlog_pretty.md
          if-no-files-found: error
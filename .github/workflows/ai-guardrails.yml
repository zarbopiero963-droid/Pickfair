name: AI Guardrails

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  guardrails:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest requests

      - name: detect changed files
        id: changes
        shell: bash
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.sha }}"

          FILES="$(git diff --name-only "$BASE" "$HEAD" | tr '\n' ' ')"
          FILES_CSV="$(git diff --name-only "$BASE" "$HEAD" | paste -sd, -)"

          echo "AI_CHANGED_FILES=$FILES_CSV" >> "$GITHUB_ENV"
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: build dependency graph
        run: |
          python tools/repo_guardrail.py build-graph

      - name: compute targeted tests
        run: |
          python tools/compute_targeted_tests.py ${{ steps.changes.outputs.files }}

      - name: run guardrail tests
        run: |
          pytest -q tests/guardrails

      - name: run targeted tests
        shell: bash
        run: |
          TARGET=$(python -c "import json; print(' '.join(json.load(open('guardrails/targeted_tests.json'))['targeted_tests']))")
          if [ -n "$TARGET" ]; then
            pytest -q $TARGET
          else
            echo 'No targeted tests found.'
          fi

      - name: run reasoning guard
        env:
          LLM_GUARD_API_KEY: ${{ secrets.LLM_GUARD_API_KEY }}
          LLM_GUARD_MODEL: ${{ secrets.LLM_GUARD_MODEL }}
          LLM_GUARD_BASE_URL: ${{ secrets.LLM_GUARD_BASE_URL }}
          LLM_GUARD_SITE_URL: ${{ secrets.LLM_GUARD_SITE_URL }}
          LLM_GUARD_APP_NAME: ${{ secrets.LLM_GUARD_APP_NAME }}
        run: |
          python tools/ai_reasoning_guard.py run ${{ steps.changes.outputs.files }}

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: guardrails
          path: |
            guardrails/*.json
            guardrails/*.md
            artifacts/*.json
            artifacts/*.md
          if-no-files-found: warn

      - name: comment PR
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python tools/pr_comment_report.py

      - name: block merge if needed
        shell: bash
        run: |
          python -c "import json,sys; r=json.load(open('guardrails/ai_reasoning_guard_report.json')); print('Merge blocked by AI guardrails' if r['decision']['block_merge'] else 'Merge allowed'); sys.exit(1 if r['decision']['block_merge'] else 0)"
name: AI Guardrails

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  guardrails:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi
          pip install pytest || true

      - name: Create dependency snapshot if missing
        run: |
          if [ ! -f guardrails/allowed_dependencies.json ]; then
            python tools/repo_guardrail.py snapshot-deps
          fi

      - name: Check dependency graph
        run: |
          python tools/repo_guardrail.py check-deps

      - name: Create API snapshot if missing
        run: |
          if [ ! -f guardrails/public_api_snapshot.json ]; then
            python tools/repo_guardrail.py snapshot-api
          fi

      - name: Run guardrail tests
        run: |
          if [ -d tests/guardrails ]; then
            pytest -q tests/guardrails
          else
            echo "No guardrail tests found"
          fi

      - name: Create scope snapshot if missing
        run: |
          if [ ! -f guardrails/allowed_scope_files.json ]; then
            python tools/repo_guardrail.py snapshot-scope
          fi

      - name: Validate guardrail files
        run: |
          echo "Guardrail files:"
          ls -la guardrails || true
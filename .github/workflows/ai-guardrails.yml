name: AI Guardrails

on:
  pull_request:

jobs:
  guardrails:

    runs-on: ubuntu-latest

    steps:

      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest requests

      - name: detect changed files
        id: changes
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.sha }}

          FILES=$(git diff --name-only $BASE $HEAD)

          echo "AI_CHANGED_FILES=$(echo $FILES | tr '\n' ',')" >> $GITHUB_ENV
          echo "files=$(echo $FILES | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: build dependency graph
        run: |
          python tools/repo_guardrail.py build-graph

      - name: compute targeted tests
        run: |
          python tools/compute_targeted_tests.py ${{ steps.changes.outputs.files }}

      - name: run guardrail tests
        run: |
          pytest -q tests/guardrails

      - name: run targeted tests
        run: |
          TARGET=$(python - <<EOF
import json
print(" ".join(json.load(open("guardrails/targeted_tests.json"))["targeted_tests"]))
EOF
)
          if [ ! -z "$TARGET" ]; then
            pytest -q $TARGET
          fi

      - name: run reasoning guard
        env:
          LLM_GUARD_API_KEY: ${{ secrets.LLM_GUARD_API_KEY }}
        run: |
          python tools/ai_reasoning_guard.py run ${{ steps.changes.outputs.files }}

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: guardrails
          path: |
            guardrails/*.json
            artifacts/*.json

      - name: comment PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python tools/pr_comment_report.py

      - name: block merge if needed
        run: |
          python - <<EOF
import json,sys
r=json.load(open("guardrails/ai_reasoning_guard_report.json"))
if r["decision"]["block_merge"]:
    print("Merge blocked by AI guardrails")
    sys.exit(1)
EOF
name: AI Guardrails

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  guardrails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi
          pip install pytest requests

      - name: Prepare folders
        shell: bash
        run: |
          mkdir -p guardrails
          mkdir -p artifacts

      - name: Detect changed files
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
            FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | paste -sd, -)"
          else
            FILES=""
          fi

          echo "AI_CHANGED_FILES=$FILES" >> "$GITHUB_ENV"
          echo "files_csv=$FILES" >> "$GITHUB_OUTPUT"

          echo "Changed files: $FILES"

      - name: Build API snapshot if missing
        shell: bash
        run: |
          if [ ! -f guardrails/public_api_snapshot.json ]; then
            python tools/repo_guardrail.py snapshot-api
          fi

      - name: Build dependency graph
        shell: bash
        run: |
          python tools/repo_guardrail.py build-graph

      - name: Run repository intelligence
        shell: bash
        run: |
          python scripts/repo_api_report_v4.py
          python scripts/generate_fix_backlog.py

      - name: Run guardrail tests
        shell: bash
        env:
          AI_CHANGED_FILES: ${{ steps.changes.outputs.files_csv }}
        run: |
          pytest -q tests/guardrails

      - name: Run reasoning guard
        shell: bash
        env:
          AI_CHANGED_FILES: ${{ steps.changes.outputs.files_csv }}
          LLM_GUARD_API_KEY: ${{ secrets.LLM_GUARD_API_KEY }}
          LLM_GUARD_MODEL: ${{ secrets.LLM_GUARD_MODEL }}
          LLM_GUARD_BASE_URL: ${{ secrets.LLM_GUARD_BASE_URL }}
          LLM_GUARD_SITE_URL: ${{ secrets.LLM_GUARD_SITE_URL }}
          LLM_GUARD_APP_NAME: ${{ secrets.LLM_GUARD_APP_NAME }}
        run: |
          set +e
          python tools/ai_reasoning_guard.py run > guardrails/ai_reasoning_guard_stdout.log 2> guardrails/ai_reasoning_guard_stderr.log
          EXIT_CODE=$?
          echo "Reasoning guard exit code: $EXIT_CODE"

          if [ ! -f guardrails/ai_reasoning_guard_report.json ]; then
            python -c "import json; from pathlib import Path; \
stdout_path=Path('guardrails/ai_reasoning_guard_stdout.log'); \
stderr_path=Path('guardrails/ai_reasoning_guard_stderr.log'); \
stdout_text=stdout_path.read_text(encoding='utf-8', errors='ignore') if stdout_path.exists() else ''; \
stderr_text=stderr_path.read_text(encoding='utf-8', errors='ignore') if stderr_path.exists() else ''; \
report={ \
'changed_files': [], \
'scope_check': {'ok': False, 'violations': []}, \
'impact_analysis': {'changed_modules': [], 'impacted_modules': [], 'impacted_paths': []}, \
'api_snapshot_diff': {'added_modules': [], 'removed_modules': [], 'changed_modules': []}, \
'semantic_checks': {'ok': False, 'checks': []}, \
'runtime_smokes': {'ok': False, 'smokes': []}, \
'mutation_probes': {'ok': False, 'probes': []}, \
'findings': [{'severity': 'CRITICAL', 'category': 'reasoning_guard_crash', 'file': 'tools/ai_reasoning_guard.py', 'symbol': 'workflow', 'message': 'ai_reasoning_guard.py crashed before producing its JSON report.'}], \
'ai_review': {'enabled': False, 'ok': False, 'error': 'Reasoning guard crashed before report generation.'}, \
'decision': {'deterministic_risk': 'CRITICAL', 'ai_risk': None, 'final_risk': 'CRITICAL', 'block_merge': True, 'block_reasons': ['Reasoning guard crashed before generating report.']}, \
'status_summary': {'semantic_ok': False, 'runtime_ok': False, 'mutation_ok': False, 'ai_review_ok': False, 'failed_semantic_checks': [], 'failed_runtime_smokes': [], 'weak_mutation_paths': [], 'final_risk': 'CRITICAL', 'block_merge': True, 'block_reasons': ['Reasoning guard crashed before generating report.']}, \
'debug': {'stdout_tail': stdout_text[-4000:], 'stderr_tail': stderr_text[-4000:]} \
}; \
Path('guardrails/ai_reasoning_guard_report.json').write_text(json.dumps(report, indent=2, ensure_ascii=False), encoding='utf-8')"
          fi

          exit 0

      - name: Print guard status
        if: always()
        shell: bash
        run: |
          python -c "import json, sys; from pathlib import Path; \
p=Path('guardrails/ai_reasoning_guard_report.json'); \
print('Report exists =', p.exists()); \
if not p.exists(): sys.exit(2); \
data=json.loads(p.read_text(encoding='utf-8')); \
s=data.get('status_summary', {}); \
print('SEMANTIC_OK =', s.get('semantic_ok')); \
print('RUNTIME_OK =', s.get('runtime_ok')); \
print('MUTATION_OK =', s.get('mutation_ok')); \
print('AI_REVIEW_OK =', s.get('ai_review_ok')); \
print('FINAL_RISK =', s.get('final_risk')); \
print('BLOCK_MERGE =', s.get('block_merge')); \
print('FAILED_SEMANTIC =', '; '.join(s.get('failed_semantic_checks', []))); \
print('FAILED_RUNTIME =', '; '.join(s.get('failed_runtime_smokes', []))); \
print('BLOCK_REASONS =', '; '.join(s.get('block_reasons', [])))"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-guardrails-artifacts
          path: |
            guardrails/*.json
            guardrails/*.log
            artifacts/*.json
            artifacts/*.md
          if-no-files-found: warn

      - name: Comment PR
        if: always() && github.event_name == 'pull_request'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python tools/pr_comment_report.py || true

      - name: Block merge if needed
        if: always()
        shell: bash
        run: |
          python -c "import json, sys; from pathlib import Path; \
p=Path('guardrails/ai_reasoning_guard_report.json'); \
if not p.exists(): print('::error::Missing guardrails/ai_reasoning_guard_report.json'); sys.exit(2); \
data=json.loads(p.read_text(encoding='utf-8')); \
decision=data.get('decision', {}); \
status=data.get('status_summary', {}); \
if decision.get('block_merge', False): \
    print(f'::error::AI Guardrails blocked merge | final_risk={decision.get(\"final_risk\")} | semantic_ok={status.get(\"semantic_ok\")} | runtime_ok={status.get(\"runtime_ok\")} | mutation_ok={status.get(\"mutation_ok\")} | ai_review_ok={status.get(\"ai_review_ok\")}'); \
    sys.exit(2); \
print('AI Guardrails: merge allowed.')"
name: AI Guardrails

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  guardrails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt || true; fi
          pip install pytest || true
          pip install requests || true

      - name: Ensure guardrails directory exists
        run: mkdir -p guardrails

      - name: Refresh guardrail snapshots automatically
        run: |
          python tools/repo_guardrail.py snapshot-api
          python tools/repo_guardrail.py snapshot-deps
          python tools/repo_guardrail.py snapshot-scope

      - name: Show guardrail files
        run: |
          echo "==============================="
          echo "GUARDRAIL FILES"
          echo "==============================="
          ls -la guardrails || true

      - name: Run guardrail tests
        run: |
          if [ -d tests/guardrails ]; then
            pytest -q tests/guardrails
          else
            echo "No guardrail tests found"
          fi

      - name: Auto-commit refreshed guardrail snapshots on main
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add guardrails/public_api_snapshot.json guardrails/allowed_dependencies.json guardrails/allowed_scope_files.json

          if git diff --cached --quiet; then
            echo "No guardrail snapshot changes to commit"
          else
            BRANCH="auto/update-guardrail-snapshots"
            git checkout -b "$BRANCH"
            git commit -m "auto-update guardrail snapshots"
            git push -f origin "$BRANCH"
            # Close any existing PR from this branch before opening a new one
            EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)
            if [ -n "$EXISTING_PR" ]; then
              gh pr close "$EXISTING_PR" 2>/dev/null || true
            fi
            gh pr create \
              --title "Auto-update guardrail snapshots" \
              --body "Automated PR to update guardrail snapshot files." \
              --base main \
              --head "$BRANCH"
          fi
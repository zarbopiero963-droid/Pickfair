name: AI Guardrails

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  phase3:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

          pip install pytest requests

      - name: Create folders
        shell: bash
        run: |
          mkdir -p artifacts
          mkdir -p guardrails

      - name: Detect changed files
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
            FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | paste -sd, -)"
          else
            FILES=""
          fi

          echo "AI_CHANGED_FILES=$FILES" >> "$GITHUB_ENV"
          echo "files_csv=$FILES" >> "$GITHUB_OUTPUT"

          echo "Changed files: $FILES"

      - name: Build public API snapshot if missing
        shell: bash
        run: |
          if [ ! -f guardrails/public_api_snapshot.json ]; then
            python tools/repo_guardrail.py snapshot-api
          else
            echo "public_api_snapshot.json already exists"
          fi

      - name: Build dependency graph
        shell: bash
        run: |
          python tools/repo_guardrail.py build-graph

      - name: Run repository API report
        shell: bash
        run: |
          python scripts/repo_api_report_v4.py

      - name: Generate fix backlog
        shell: bash
        run: |
          python scripts/generate_fix_backlog.py

      - name: Run guardrail tests
        shell: bash
        env:
          AI_CHANGED_FILES: ${{ steps.changes.outputs.files_csv }}
        run: |
          if [ -d tests/guardrails ]; then
            pytest -q tests/guardrails
          else
            echo "tests/guardrails not found"
            exit 1
          fi

      - name: Show generated files
        if: always()
        shell: bash
        run: |
          echo "Artifacts:"
          ls -la artifacts || true
          echo "Guardrails:"
          ls -la guardrails || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-guardrails-phase3
          path: |
            artifacts/*.json
            artifacts/*.md
            guardrails/*.json
          if-no-files-found: warn
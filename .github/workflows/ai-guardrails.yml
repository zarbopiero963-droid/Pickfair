name: AI Guardrails

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  guardrails:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install pytest

      - run: mkdir -p guardrails

      - name: Refresh snapshots
        run: |
          python tools/repo_guardrail.py snapshot-api
          python tools/repo_guardrail.py snapshot-deps
          python tools/repo_guardrail.py snapshot-scope

      - name: Run guardrail tests
        run: |
          if [ -d tests/guardrails ]; then
            pytest -q tests/guardrails
          fi

      - name: Auto commit guardrails
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add guardrails/*.json

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "auto update guardrails"
            git push
          fi
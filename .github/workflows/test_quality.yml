name: Pickfair Test Quality

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shallow-test-check:
    name: Shallow Test Detection
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run shallow test analysis
        run: |
          python scripts/find_shallow_tests.py
          python scripts/prioritize_test_cleanup.py

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: shallow-test-reports
          path: artifacts/
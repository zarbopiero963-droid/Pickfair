name: Pickfair CI Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:

  full_test_coverage_gate:
    name: Full Test & Coverage Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pytest pytest-cov

      - name: Import smoke
        run: |
          python - <<'PY'
          modules = [
              "database",
              "dutching",
              "telegram_listener",
              "telegram_sender",
              "core.trading_engine",
              "core.risk_middleware",
              "controllers.dutching_controller",
              "app_modules.telegram_module",
              "main",
          ]
          for m in modules:
              __import__(m)
              print("[OK]", m)
          PY

      - name: Run full tests
        run: |
          xvfb-run -a pytest tests \
            -vv \
            --maxfail=1 \
            --durations=15 \
            --cov=. \
            --cov-report=term-missing

  pickfair_test_suite:
    name: Pickfair Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - run: |
          xvfb-run -a pytest tests -x -vv

  repo_autopsy:
    name: Repo Autopsy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python - <<'PY'
          import os,ast
          for root,_,files in os.walk("."):
              if ".git" in root: continue
              for f in files:
                  if f.endswith(".py"):
                      p=os.path.join(root,f)
                      try:
                          ast.parse(open(p).read())
                          print("[OK]",p)
                      except Exception as e:
                          print("[ERR]",p,e)
          PY

  repo_forensics:
    name: Repo Forensics
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python - <<'PY'
          import os,ast
          for root,_,files in os.walk("."):
              if ".git" in root: continue
              for f in files:
                  if f.endswith(".py"):
                      path=os.path.join(root,f)
                      try:
                          tree=ast.parse(open(path).read())
                          funcs=[n.name for n in ast.walk(tree) if isinstance(n,ast.FunctionDef)]
                          print(path,len(funcs),"functions")
                      except: pass
          PY

  system_validation:
    name: System Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: System tests
        run: |
          if [ -f tests/test_system_simulation.py ]; then
            pytest tests/test_system_simulation.py -vv
          fi

          if [ -f tests/test_system_expanded_validation.py ]; then
            pytest tests/test_system_expanded_validation.py -vv
          fi

  unified_final_log:
    name: Unified Final Log
    runs-on: ubuntu-latest
    if: always()
    needs:
      - full_test_coverage_gate
      - pickfair_test_suite
      - repo_autopsy
      - repo_forensics
      - system_validation

    steps:

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip jq

      - name: Download logs archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -L \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/logs \
            -o logs.zip

      - name: Extract logs
        run: |
          unzip logs.zip -d logs

      - name: Merge logs
        run: |
          echo "##############################################################################################################"
          echo "PICKFAIR UNIFIED FINAL LOG"
          echo "##############################################################################################################"
          echo
          echo "Repository : ${{ github.repository }}"
          echo "Run ID     : ${{ github.run_id }}"
          echo
          echo "=============================================================================================================="
          echo "FINAL JOB SUMMARY"
          echo "=============================================================================================================="
          echo "Full Test & Coverage Gate : ${{ needs.full_test_coverage_gate.result }}"
          echo "Pickfair Test Suite       : ${{ needs.pickfair_test_suite.result }}"
          echo "Repo Autopsy              : ${{ needs.repo_autopsy.result }}"
          echo "Repo Forensics            : ${{ needs.repo_forensics.result }}"
          echo "System Validation         : ${{ needs.system_validation.result }}"
          echo
          echo "=============================================================================================================="
          echo "MERGED JOB LOGS"
          echo "=============================================================================================================="

          for f in logs/*.txt; do
            echo
            echo "##############################################################################################################"
            echo "JOB LOG FILE: $f"
            echo "##############################################################################################################"
            cat "$f"
            echo
          done

          echo
          echo "=============================================================================================================="
          echo "END OF UNIFIED FINAL LOG"
          echo "=============================================================================================================="
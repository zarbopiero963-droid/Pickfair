name: Pickfair CI Pipeline

on:
  push:
  pull_request:

permissions:
  contents: read
  actions: read

jobs:

  full_test_coverage_gate:
    name: Full Test & Coverage Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Full Test & Coverage Gate
        run: |
          echo "============================="
          echo "FULL TEST & COVERAGE GATE"
          echo "============================="
          xvfb-run -a pytest -vv --maxfail=1 --cov=. --cov-report=term


  pickfair_test_suite:
    name: Pickfair Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Pickfair Test Suite
        run: |
          echo "============================="
          echo "PICKFAIR TEST SUITE"
          echo "============================="
          xvfb-run -a pytest tests -vv --maxfail=1


  repo_autopsy:
    name: Repo Autopsy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repo Autopsy
        run: |
          echo "============================="
          echo "REPO AUTOPSY START"
          echo "============================="

          echo "[INFO] Python files found:"
          find . -name "*.py" | sort

          echo ""
          echo "============================="
          echo "ROOT FILES"
          echo "============================="
          ls -la

          echo ""
          echo "============================="
          echo "TESTS FILES"
          echo "============================="
          if [ -d tests ]; then
            ls -la tests
          else
            echo "tests directory not found"
          fi

          echo ""
          echo "============================="
          echo "REPO AUTOPSY END"
          echo "============================="


  repo_forensics:
    name: Repo Forensics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repo Forensics
        run: |
          python - <<'PY'
          import os
          import py_compile

          print("======================================================================")
          print("REPO FORENSICS START")
          print("======================================================================")

          failed = []

          for root, _, files in os.walk("."):
              for file in sorted(files):
                  if file.endswith(".py"):
                      path = os.path.join(root, file)
                      try:
                          py_compile.compile(path, doraise=True)
                          print(f"[GREEN][OK] {path}")
                      except Exception as e:
                          print(f"[RED][FAIL] {path} -> {e}")
                          failed.append(path)

          print("")
          print("======================================================================")
          print("REPO FORENSICS END")
          print("======================================================================")

          if failed:
              print("")
              print("FILES WITH SYNTAX ERRORS:")
              for path in failed:
                  print(" -", path)
              raise SystemExit(1)
          PY


  system_validation:
    name: System Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: System Validation
        run: |
          python - <<'PY'
          import importlib

          modules = [
              "database",
              "dutching",
              "telegram_listener",
              "telegram_sender",
              "core.trading_engine",
              "core.risk_middleware",
              "controllers.dutching_controller",
              "app_modules.telegram_module",
              "main",
          ]

          print("===============================")
          print("IMPORT SMOKE TEST")
          print("===============================")

          failed = []
          for module in modules:
              try:
                  importlib.import_module(module)
                  print(f"[GREEN][OK] {module}")
              except Exception as e:
                  print(f"[RED][FAIL] {module} -> {e}")
                  failed.append(module)

          if failed:
              raise SystemExit(1)
          PY


  unified_final_log:
    name: Unified Final Log
    runs-on: ubuntu-latest
    if: always()

    needs:
      - full_test_coverage_gate
      - pickfair_test_suite
      - repo_autopsy
      - repo_forensics
      - system_validation

    steps:
      - name: Build unified final log
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import io
          import json
          import os
          import sys
          import time
          import urllib.request
          import zipfile

          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          token = os.environ["GH_TOKEN"]

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "pickfair-ci-unified-log",
          }

          def api_get(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=60) as resp:
                  return resp.read()

          def api_get_json(url):
              return json.loads(api_get(url).decode("utf-8"))

          def fetch_job_logs(job_id):
              url = f"https://api.github.com/repos/{repo}/actions/jobs/{job_id}/logs"
              data = api_get(url)
              zf = zipfile.ZipFile(io.BytesIO(data))
              parts = []

              for name in zf.namelist():
                  parts.append("")
                  parts.append("=" * 90)
                  parts.append(f"LOG FILE: {name}")
                  parts.append("=" * 90)
                  try:
                      content = zf.read(name).decode("utf-8", errors="ignore")
                  except Exception as e:
                      content = f"[ERROR READING LOG FILE] {e}"
                  parts.append(content)

              return "\n".join(parts)

          jobs_url = f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/jobs?per_page=100"
          jobs_payload = api_get_json(jobs_url)
          jobs = jobs_payload.get("jobs", [])

          interesting_names = [
              "Full Test & Coverage Gate",
              "Pickfair Test Suite",
              "Repo Autopsy",
              "Repo Forensics",
              "System Validation",
          ]

          jobs_by_name = {job["name"]: job for job in jobs}

          print("")
          print("#" * 110)
          print("PICKFAIR UNIFIED FINAL LOG")
          print("#" * 110)
          print(f"Repository : {repo}")
          print(f"Run ID     : {run_id}")
          print("")

          print("=" * 110)
          print("FINAL JOB SUMMARY")
          print("=" * 110)

          overall_failed = False

          for name in interesting_names:
              job = jobs_by_name.get(name)
              if not job:
                  print(f"[MISSING] {name}")
                  overall_failed = True
                  continue

              conclusion = job.get("conclusion")
              status = job.get("status")
              started_at = job.get("started_at")
              completed_at = job.get("completed_at")

              if conclusion not in ("success", "skipped"):
                  overall_failed = True

              print(f"JOB        : {name}")
              print(f"STATUS     : {status}")
              print(f"CONCLUSION : {conclusion}")
              print(f"STARTED    : {started_at}")
              print(f"COMPLETED  : {completed_at}")
              print("-" * 110)

          print("")
          print("=" * 110)
          print("FULL MERGED LOGS")
          print("=" * 110)

          for name in interesting_names:
              job = jobs_by_name.get(name)
              print("")
              print("#" * 110)
              print(f"JOB: {name}")
              print("#" * 110)

              if not job:
                  print("[ERROR] Job not found in GitHub Actions API response.")
                  continue

              job_id = job["id"]
              conclusion = job.get("conclusion")
              print(f"JOB ID     : {job_id}")
              print(f"CONCLUSION : {conclusion}")
              print("")

              try:
                  merged_log = fetch_job_logs(job_id)
                  if merged_log.strip():
                      print(merged_log)
                  else:
                      print("[INFO] Empty log returned for this job.")
              except Exception as e:
                  print(f"[ERROR] Unable to fetch job logs: {e}")

          print("")
          print("=" * 110)
          print("END OF UNIFIED FINAL LOG")
          print("=" * 110)

          if overall_failed:
              sys.exit(1)
          PY
name: Pickfair Test Suite

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  esegui-test:
    runs-on: ubuntu-latest

    steps:
    - name: Scarica il codice
      uses: actions/checkout@v4

    - name: Configura Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Installa Dipendenze e Progetto (Enterprise Mode)
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov numpy pandas betfairlightweight telethon customtkinter matplotlib requests
        
        # Installa il tuo progetto in modalità "editable" per risolvere TUTTI gli import
        pip install -e .

    - name: Lancia tutti i test
      run: |
        pytest tests/ --ignore=tests/test_dutching_safety.py --ignore=tests/test_performance.py -v
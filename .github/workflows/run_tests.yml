name: Pickfair Test Suite

# Questo dice a GitHub di avviare i test ad ogni modifica sul branch main
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Permette anche di avviarli manualmente con un bottone

jobs:
  esegui-test:
    runs-on: ubuntu-latest # Usiamo Linux perché è velocissimo per i test

    steps:
    - name: Scarica il codice
      uses: actions/checkout@v4

    - name: Configura Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Installa le dipendenze
      run: |
        python -m pip install --upgrade pip
        # Installa Pytest (il motore di test) e le librerie del tuo bot
        pip install pytest pytest-cov numpy pandas betfairlightweight telethon customtkinter matplotlib requests
        
        # Se hai un file requirements.txt decommenta la riga sotto:
        # pip install -r requirements.txt

    - name: Lancia tutti i test
      # Il flag -v (verbose) serve a darti la spiegazione dettagliata se qualcosa fallisce
      run: |
        pytest tests/ -v

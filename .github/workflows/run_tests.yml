name: Pickfair Test Suite

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  esegui-test:
    runs-on: ubuntu-latest

    steps:
    - name: Scarica il codice
      uses: actions/checkout@v4

    - name: Configura Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Installa le dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov numpy pandas betfairlightweight telethon customtkinter matplotlib requests

    - name: Lancia tutti i test
      # Diciamo a Python esattamente dove si trovano le tue cartelle (ai, controllers, ecc.)
      env:
        PYTHONPATH: ${{ github.workspace }}
      # Usiamo 'python -m pytest' che è il metodo ufficiale per evitare il ModuleNotFoundError
      run: |
        python -m pytest tests/ --ignore=tests/test_dutching_safety.py --ignore=tests/test_performance.py -v
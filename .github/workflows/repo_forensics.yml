name: Repo Forensics

on:
  workflow_dispatch:

jobs:
  forensics:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Core system forensics
        run: |
          python - <<'PY'
          import ast
          import os

          CORE_FILES=[
              "database.py",
              "dutching.py",
              "controllers/dutching_controller.py",
              "main.py",
              "telegram_listener.py",
              "telegram_sender.py",
              "core/trading_engine.py",
              "core/risk_middleware.py",
              "app_modules/telegram_module.py",
          ]

          print("="*80)
          print("CORE FORENSICS START")
          print("="*80)

          for path in CORE_FILES:

              if not os.path.exists(path):
                  print("\nMISSING FILE:",path)
                  continue

              print("\nFILE:",path)
              print("-"*80)

              try:
                  tree=ast.parse(open(path,encoding="utf-8").read())
              except Exception as e:
                  print("PARSE ERROR:",e)
                  continue

              imports=[]
              classes=[]
              functions=[]
              calls=[]

              for node in ast.walk(tree):

                  if isinstance(node,ast.Import):
                      for alias in node.names:
                          imports.append(alias.name)

                  elif isinstance(node,ast.ImportFrom):
                      imports.append(node.module or "")

                  elif isinstance(node,ast.ClassDef):
                      classes.append(node.name)

                  elif isinstance(node,ast.FunctionDef):
                      functions.append(node.name)

                  elif isinstance(node,ast.AsyncFunctionDef):
                      functions.append(node.name)

                  elif isinstance(node,ast.Call):

                      if isinstance(node.func,ast.Name):
                          calls.append(node.func.id)

                      elif isinstance(node.func,ast.Attribute):
                          calls.append(node.func.attr)

              print("Classes:",classes)
              print("Functions:",functions)
              print("Imports:",imports[:60])
              print("Calls:",calls[:120])

          print("\n"+"="*80)
          print("CORE FORENSICS END")
          print("="*80)

          PY
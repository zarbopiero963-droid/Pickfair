name: Repo Forensics

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "**/*.py"
      - ".github/workflows/repo_forensics.yml"
  workflow_dispatch:

jobs:
  forensics:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install networkx

      - name: Run repo forensics
        run: |
          python - <<'PY'
          import ast
          import os
          from collections import Counter, defaultdict

          import networkx as nx

          SKIP_PARTS = {".git", ".venv", "venv", "__pycache__", ".pytest_cache", "artifacts"}

          py_files = []
          for base, _, files in os.walk("."):
              if any(part in base for part in SKIP_PARTS):
                  continue
              for name in files:
                  if name.endswith(".py"):
                      py_files.append(os.path.join(base, name).replace("\\", "/"))

          py_files = sorted(py_files)

          def module_to_repo_path(mod_name: str):
              if not mod_name:
                  return None
              candidate = mod_name.replace(".", "/") + ".py"
              if os.path.exists(candidate):
                  return candidate.replace("\\", "/")
              init_candidate = mod_name.replace(".", "/") + "/__init__.py"
              if os.path.exists(init_candidate):
                  return init_candidate.replace("\\", "/")
              return mod_name

          imports_per_file = defaultdict(set)
          funcs_per_file = defaultdict(list)
          classes_per_file = defaultdict(list)

          g = nx.DiGraph()

          for path in py_files:
              g.add_node(path)
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      source = f.read()
                  tree = ast.parse(source, filename=path)
              except Exception as e:
                  print(f"[RED][PARSE_ERROR] {path} -> {e}")
                  continue

              for node in ast.walk(tree):
                  if isinstance(node, ast.Import):
                      for alias in node.names:
                          mod = alias.name
                          imports_per_file[path].add(mod)
                          g.add_edge(path, str(module_to_repo_path(mod)))
                  elif isinstance(node, ast.ImportFrom):
                      mod = node.module or ""
                      imports_per_file[path].add(mod)
                      g.add_edge(path, str(module_to_repo_path(mod)))
                  elif isinstance(node, ast.FunctionDef):
                      funcs_per_file[path].append(node.name)
                  elif isinstance(node, ast.AsyncFunctionDef):
                      funcs_per_file[path].append(node.name)
                  elif isinstance(node, ast.ClassDef):
                      classes_per_file[path].append(node.name)

          degree_rank = sorted(g.degree, key=lambda x: x[1], reverse=True)[:30]
          indegree_rank = sorted(g.in_degree, key=lambda x: x[1], reverse=True)[:30]
          outdegree_rank = sorted(g.out_degree, key=lambda x: x[1], reverse=True)[:30]

          try:
              cycles = list(nx.simple_cycles(g))[:20]
          except Exception:
              cycles = []

          print("=" * 70)
          print("REPO FORENSICS START")
          print("=" * 70)

          print(f"[INFO] Total Python files: {len(py_files)}")
          print(f"[INFO] Total graph nodes: {len(g.nodes)}")
          print(f"[INFO] Total graph edges: {len(g.edges)}")

          print("\n" + "=" * 70)
          print("TOP DEGREE RANKING")
          print("=" * 70)
          for node, score in degree_rank:
              print(f"[RANK][DEGREE] score={score:>3} node={node}")

          print("\n" + "=" * 70)
          print("TOP IN-DEGREE RANKING")
          print("=" * 70)
          for node, score in indegree_rank:
              print(f"[RANK][IN] score={score:>3} node={node}")

          print("\n" + "=" * 70)
          print("TOP OUT-DEGREE RANKING")
          print("=" * 70)
          for node, score in outdegree_rank:
              print(f"[RANK][OUT] score={score:>3} node={node}")

          print("\n" + "=" * 70)
          print("HOT MODULES DETAILS")
          print("=" * 70)
          hot_nodes = [node for node, _ in degree_rank[:15]]
          for node in hot_nodes:
              print(f"\n[MODULE] {node}")
              for cls in classes_per_file.get(node, []):
                  print(f"  [CLASS] {cls}")
              for fn in funcs_per_file.get(node, [])[:50]:
                  print(f"  [FUNC] {fn}")
              for imp in sorted(imports_per_file.get(node, [])):
                  print(f"  [IMPORT] {imp}")

          print("\n" + "=" * 70)
          print("DEPENDENCY CYCLES")
          print("=" * 70)
          if cycles:
              for idx, cycle in enumerate(cycles, start=1):
                  print(f"[RED][CYCLE {idx}] {' -> '.join(cycle)}")
          else:
              print("[GREEN][OK] No dependency cycles detected")

          print("\n" + "=" * 70)
          print("REPO FORENSICS END")
          print("=" * 70)
          PY
name: Repo Forensics

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "**/*.py"
      - ".github/workflows/repo_forensics.yml"

jobs:
  forensics:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install networkx pydot pyvis

      - name: Build repo analysis
        run: |
          mkdir -p artifacts
          python - <<'PY'
          import ast, os, json
          from collections import defaultdict, Counter

          py_files = []

          for base, _, files in os.walk("."):
              if ".git" in base or "__pycache__" in base:
                  continue
              for f in files:
                  if f.endswith(".py"):
                      py_files.append(os.path.join(base, f))

          imports_map = defaultdict(list)
          edges = []
          centrality = Counter()

          for path in py_files:
              try:
                  tree = ast.parse(open(path, encoding="utf-8").read())
              except:
                  continue

              for node in ast.walk(tree):
                  if isinstance(node, ast.Import):
                      for alias in node.names:
                          imports_map[path].append(alias.name)
                          edges.append((path, alias.name))

                  if isinstance(node, ast.ImportFrom):
                      mod = node.module or ""
                      imports_map[path].append(mod)
                      edges.append((path, mod))

          for s, d in edges:
              centrality[s] += 1
              centrality[d] += 1

          ranking = centrality.most_common()

          json.dump(
              {
                  "files": py_files,
                  "edges": edges,
                  "ranking": ranking
              },
              open("artifacts/analysis.json","w"),
              indent=2
          )

          print("Repo analysis completed")
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repo-forensics
          path: artifacts/*
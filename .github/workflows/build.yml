name: Build Pickfair EXE

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Installa Dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller betfairlightweight telethon customtkinter numpy matplotlib pandas requests urllib3 certifi
        
    - name: Crea cartella plugins se mancante
      run: New-Item -ItemType Directory -Force -Path plugins
        
    - name: Compila Eseguibile con PyInstaller (Enterprise Mode)
      run: >
        pyinstaller --onefile --windowed --name Pickfair 
        --add-data "plugins;plugins" 
        --collect-all customtkinter 
        --collect-submodules app_modules 
        --collect-submodules controllers 
        --collect-submodules core 
        --collect-submodules ui 
        --hidden-import=numpy 
        --hidden-import=pandas 
        --hidden-import=matplotlib 
        --hidden-import=betfairlightweight 
        --hidden-import=betfairlightweight.streaming 
        --hidden-import=telethon 
        --hidden-import=plugin_manager 
        main.py

    - name: Carica EXE come Artifact (Scaricabile)
      uses: actions/upload-artifact@v4
      with:
        name: Pickfair-Windows-EXE
        path: dist/Pickfair.exe
        retention-days: 14

    - name: Carica su Release pubblica (Solo su Tag)
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/Pickfair.exe
        repository: petiro/Pickfair
        token: ${{ secrets.RELEASE_TOKEN }}

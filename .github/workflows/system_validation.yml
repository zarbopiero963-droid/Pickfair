name: System Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "**/*.py"
      - "tests/test_system_simulation.py"
      - ".github/workflows/system_validation.yml"

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libx11-xcb1 libxrender1 libxext6 libx11-6 libgl1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            pip install pytest pytest-cov pytest-mock pytest-asyncio
          fi

      - name: Py compile all files
        run: |
          echo "==============================="
          echo "PY_COMPILE ALL FILES"
          echo "==============================="
          python - <<'PY'
          import os
          import py_compile
          import sys

          failed = []

          for root, _, files in os.walk("."):
              if ".git" in root or ".venv" in root or "venv" in root or "__pycache__" in root:
                  continue

              for name in files:
                  if name.endswith(".py"):
                      path = os.path.join(root, name)
                      try:
                          py_compile.compile(path, doraise=True)
                          print(f"[GREEN][OK] {path}")
                      except Exception as e:
                          print(f"[RED][FAIL] {path} -> {e}")
                          failed.append(path)

          if failed:
              print("\nFILES WITH SYNTAX ERRORS:")
              for f in failed:
                  print(" -", f)
              sys.exit(1)
          PY

      - name: Import smoke test for core modules
        run: |
          echo "==============================="
          echo "IMPORT SMOKE TEST"
          echo "==============================="
          python - <<'PY'
          import importlib
          import sys

          modules = [
              "database",
              "dutching",
              "telegram_listener",
              "telegram_sender",
              "core.trading_engine",
              "core.risk_middleware",
              "controllers.dutching_controller",
              "app_modules.telegram_module",
              "main",
          ]

          failed = []

          for module_name in modules:
              try:
                  importlib.import_module(module_name)
                  print(f"[GREEN][OK] {module_name}")
              except Exception as e:
                  print(f"[RED][FAIL] {module_name} -> {e}")
                  failed.append(module_name)

          if failed:
              print("\nMODULES FAILED TO IMPORT:")
              for m in failed:
                  print(" -", m)
              sys.exit(1)
          PY

      - name: Run system simulation / chaos / latency / stress tests
        run: |
          echo "==============================="
          echo "SYSTEM VALIDATION TESTS"
          echo "==============================="
          xvfb-run -a pytest -vv tests/test_system_simulation.py
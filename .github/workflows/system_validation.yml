name: System Validation

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libx11-xcb1 libxrender1 libxext6 libx11-6 libgl1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            pip install pytest pytest-cov pytest-asyncio pytest-mock coverage[toml]
          fi

          # Safety net: some jobs failed earlier on missing telethon.
          python -m pip install telethon || true

      - name: Debug Python import path
        run: |
          echo "==============================="
          echo "PYTHON / WORKSPACE DEBUG"
          echo "==============================="
          python - <<'PY'
          import os
          import sys

          print("cwd =", os.getcwd())
          print("python =", sys.executable)
          print("sys.path[0:10] =", sys.path[:10])
          print("ai exists =", os.path.isdir("ai"))
          print("ai/__init__.py exists =", os.path.isfile("ai/__init__.py"))
          print("ai/ai_guardrail.py exists =", os.path.isfile("ai/ai_guardrail.py"))
          PY

      - name: PyCompile all Python files
        run: |
          echo "==============================="
          echo "PY_COMPILE ALL FILES"
          echo "==============================="
          python - <<'PY'
          import os
          import py_compile
          import sys

          failed = []

          for root, _, files in os.walk("."):
              if any(skip in root for skip in [".git", ".venv", "venv", "__pycache__", ".pytest_cache"]):
                  continue
              for name in files:
                  if name.endswith(".py"):
                      path = os.path.join(root, name)
                      try:
                          py_compile.compile(path, doraise=True)
                          print(f"[GREEN][OK] {path}")
                      except Exception as e:
                          print(f"[RED][FAIL] {path} -> {e}")
                          failed.append(path)

          if failed:
              print("\nFILES WITH SYNTAX ERRORS:")
              for f in failed:
                  print(f" - {f}")
              sys.exit(1)
          PY

      - name: Import smoke test
        run: |
          echo "==============================="
          echo "IMPORT SMOKE TEST"
          echo "==============================="
          python - <<'PY'
          import importlib
          import sys

          modules = [
              "database",
              "dutching",
              "telegram_listener",
              "telegram_sender",
              "core.trading_engine",
              "core.risk_middleware",
              "controllers.dutching_controller",
              "app_modules.telegram_module",
              "main",
          ]

          failed = []

          for module_name in modules:
              try:
                  importlib.import_module(module_name)
                  print(f"[GREEN][OK] {module_name}")
              except Exception as e:
                  print(f"[RED][FAIL] {module_name} -> {e}")
                  failed.append(module_name)

          if failed:
              print("\nMODULES FAILED TO IMPORT:")
              for m in failed:
                  print(f" - {m}")
              sys.exit(1)
          PY

      - name: Run system simulation tests
        run: |
          echo "==============================="
          echo "SYSTEM VALIDATION TESTS"
          echo "==============================="
          if [ -f tests/test_system_simulation.py ]; then
            xvfb-run -a pytest -vv tests/test_system_simulation.py
          else
            echo "SKIP: tests/test_system_simulation.py not found"
          fi

      - name: Run expanded system validation tests
        run: |
          echo "==============================="
          echo "EXPANDED SYSTEM VALIDATION TESTS"
          echo "==============================="
          if [ -f tests/test_system_expanded_validation.py ]; then
            xvfb-run -a pytest -vv tests/test_system_expanded_validation.py
          else
            echo "SKIP: tests/test_system_expanded_validation.py not found"
          fi

      - name: Run institutional suites if present
        run: |
          echo "==============================="
          echo "INSTITUTIONAL / QUANT / HEDGE SUITES"
          echo "==============================="
          if [ -f tests/test_trading_system_hedgefund_suite.py ]; then
            xvfb-run -a pytest -vv tests/test_trading_system_hedgefund_suite.py
          else
            echo "SKIP: tests/test_trading_system_hedgefund_suite.py not found"
          fi

          if [ -f tests/test_trading_system_institutional_suite.py ]; then
            xvfb-run -a pytest -vv tests/test_trading_system_institutional_suite.py
          else
            echo "SKIP: tests/test_trading_system_institutional_suite.py not found"
          fi

          if [ -f tests/test_trading_system_quant_suite.py ]; then
            xvfb-run -a pytest -vv tests/test_trading_system_quant_suite.py
          else
            echo "SKIP: tests/test_trading_system_quant_suite.py not found"
          fi

      - name: Run broker runtime suite if present
        run: |
          echo "==============================="
          echo "SIMULATION BROKER SUITE"
          echo "==============================="
          if [ -f tests/test_simulation_broker_runtime.py ]; then
            xvfb-run -a pytest -vv tests/test_simulation_broker_runtime.py
          else
            echo "SKIP: tests/test_simulation_broker_runtime.py not found"
          fi

      - name: Debug workspace
        if: always()
        run: |
          echo "==============================="
          echo "WORKSPACE FILES"
          echo "==============================="
          ls -la
          echo "==============================="
          echo "AI PACKAGE"
          echo "==============================="
          ls -la ai || true
          echo "==============================="
          echo "TESTS FILES"
          echo "==============================="
          ls -la tests || true          echo "EXPANDED SYSTEM VALIDATION TESTS"
          echo "==============================="
          xvfb-run -a pytest -vv tests/test_system_expanded_validation.py

      - name: Debug workspace
        if: always()
        run: |
          echo "==============================="
          echo "WORKSPACE FILES"
          echo "==============================="
          ls -la
          echo "==============================="
          echo "TESTS FILES"
          echo "==============================="
          ls -la tests || true

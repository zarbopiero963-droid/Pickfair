name: Full Test & Coverage Gate

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system UI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libx11-xcb1 libxrender1 libxext6 libx11-6 libgl1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            pip install pytest pytest-cov coverage[toml] pytest-asyncio pytest-mock mutmut
          fi

          # safety net for telegram imports in CI
          python -m pip install telethon customtkinter || true

      - name: Debug Python import environment
        run: |
          python - <<'PY'
          import os
          import sys

          print("cwd =", os.getcwd())
          print("python =", sys.executable)
          print("sys.path[0:10] =", sys.path[:10])
          print("ai exists =", os.path.isdir("ai"))
          print("ai/__init__.py exists =", os.path.isfile("ai/__init__.py"))
          print("ai/ai_guardrail.py exists =", os.path.isfile("ai/ai_guardrail.py"))
          PY

      - name: Compile all Python files
        run: |
          echo "PY_COMPILE ALL FILES"
          python - <<'PY'
          import os
          import py_compile
          import sys

          failed = []

          for root, _, files in os.walk("."):
              if any(skip in root for skip in [".git", ".venv", "venv", "__pycache__", ".pytest_cache"]):
                  continue

              for name in files:
                  if name.endswith(".py"):
                      path = os.path.join(root, name)
                      try:
                          py_compile.compile(path, doraise=True)
                          print(f"[OK] {path}")
                      except Exception as e:
                          print(f"[FAIL] {path} -> {e}")
                          failed.append(path)

          if failed:
              print("\nFILES WITH SYNTAX ERRORS:")
              for f in failed:
                  print(f" - {f}")
              sys.exit(1)
          PY

      - name: Import smoke test for core modules
        run: |
          python - <<'PY'
          import importlib
          import sys

          modules = [
              "database",
              "dutching",
              "telegram_listener",
              "telegram_sender",
              "core.trading_engine",
              "core.risk_middleware",
              "controllers.dutching_controller",
              "app_modules.telegram_module",
              "main",
          ]

          failed = []

          for m in modules:
              try:
                  importlib.import_module(m)
                  print(f"[OK] {m}")
              except Exception as e:
                  print(f"[FAIL] {m} -> {e}")
                  failed.append(m)

          if failed:
              print("\nFAILED IMPORTS:")
              for m in failed:
                  print(m)
              sys.exit(1)
          PY

      - name: Run tests with strict coverage
        run: |
          xvfb-run -a pytest tests \
            -vv \
            --maxfail=1 \
            --disable-warnings \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=json \
            --cov-fail-under=70

      - name: Mutation Testing
        continue-on-error: true
        run: |
          mutmut run || true

      - name: Debug coverage
        if: always()
        run: |
          ls -la
          if [ -f coverage.json ]; then
            head -n 200 coverage.json
          else
            echo "coverage.json non trovato"
          fi

      - name: Enforce critical coverage
        run: |
          python .github/scripts/check_per_file_coverage.py

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          if-no-files-found: warn
          path: |
            coverage.xml
            coverage.json

name: Full Test & Coverage Gate

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system UI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libx11-xcb1 libxrender1 libxext6 libx11-6 libgl1-mesa-glx

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            pip install pytest pytest-cov coverage[toml] pytest-asyncio pytest-mock mutmut
          fi

      - name: Workspace diagnostics
        run: |
          echo "==============================="
          echo "WORKSPACE FILES BEFORE TESTS"
          echo "==============================="
          ls -la
          echo ""
          echo "==============================="
          echo "WORKFLOW FILES"
          echo "==============================="
          ls -la .github || true
          ls -la .github/workflows || true
          ls -la .github/scripts || true

      - name: Run tests with strict coverage
        run: |
          echo "==============================="
          echo "STARTING PYTEST EXECUTION"
          echo "==============================="

          xvfb-run -a pytest \
            -vv \
            --maxfail=1 \
            --disable-warnings \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=json \
            --cov-fail-under=90

          echo "==============================="
          echo "PYTEST COMPLETED"
          echo "==============================="

      - name: Coverage diagnostics
        if: always()
        run: |
          echo "==============================="
          echo "WORKSPACE FILES AFTER TESTS"
          echo "==============================="
          ls -la
          echo ""
          echo "==============================="
          echo "COVERAGE.XML EXISTS?"
          echo "==============================="
          test -f coverage.xml && echo "coverage.xml PRESENTE" || echo "coverage.xml ASSENTE"
          echo ""
          echo "==============================="
          echo "COVERAGE.JSON EXISTS?"
          echo "==============================="
          test -f coverage.json && echo "coverage.json PRESENTE" || echo "coverage.json ASSENTE"
          echo ""
          if [ -f coverage.json ]; then
            echo "==============================="
            echo "COVERAGE.JSON HEAD"
            echo "==============================="
            python - <<'PY'
import json
from pathlib import Path

p = Path("coverage.json")
data = json.loads(p.read_text(encoding="utf-8"))
print(json.dumps({
    "meta": data.get("meta", {}),
    "files_count": len(data.get("files", {})),
    "sample_files": list(data.get("files", {}).keys())[:10],
}, indent=2))
PY
          fi

      - name: Enforce 100% per critical files
        run: |
          python .github/scripts/check_per_file_coverage.py

      - name: Mutation Testing
        if: always()
        run: |
          echo "==============================="
          echo "MUTATION TESTING"
          echo "==============================="
          mutmut run || true

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            coverage.json
          if-no-files-found: warn
name: Full Test & Coverage Gate

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system UI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libx11-xcb1 libxrender1 libxext6 libx11-6 libgl1 python3-tk

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            pip install pytest pytest-cov coverage[toml] pytest-asyncio pytest-mock mutmut
          fi

          python -m pip install telethon customtkinter hypothesis || true

      - name: Debug Python import environment
        run: |
          python - <<'PY'
          import os
          import sys

          print("cwd =", os.getcwd())
          print("python =", sys.executable)
          print("sys.path[0:10] =", sys.path[:10])
          print("ai exists =", os.path.isdir("ai"))
          print("ai/__init__.py exists =", os.path.isfile("ai/__init__.py"))
          print("ai/ai_guardrail.py exists =", os.path.isfile("ai/ai_guardrail.py"))
          print("event_bus.py exists =", os.path.isfile("event_bus.py"))
          print("safe_mode_manager.py exists =", os.path.isfile("safe_mode_manager.py"))
          print("telegram_controller.py exists =", os.path.isfile("telegram_controller.py"))
          print("core/tick_dispatcher.py exists =", os.path.isfile("core/tick_dispatcher.py"))
          print("core/market_tracker.py exists =", os.path.isfile("core/market_tracker.py"))
          PY

      - name: Compile all Python files
        run: |
          echo "PY_COMPILE ALL FILES"
          python - <<'PY'
          import os
          import py_compile
          import sys

          failed = []

          for root, _, files in os.walk("."):
              if any(skip in root for skip in [".git", ".venv", "venv", "__pycache__", ".pytest_cache"]):
                  continue

              for name in files:
                  if name.endswith(".py"):
                      path = os.path.join(root, name)
                      try:
                          py_compile.compile(path, doraise=True)
                          print(f"[OK] {path}")
                      except Exception as e:
                          print(f"[FAIL] {path} -> {e}")
                          failed.append(path)

          if failed:
              print("\nFILES WITH SYNTAX ERRORS:")
              for f in failed:
                  print(f" - {f}")
              sys.exit(1)
          PY

      - name: Import smoke test for core modules
        run: |
          python - <<'PY'
          import importlib
          import sys

          modules = [
              "database",
              "dutching",
              "telegram_listener",
              "telegram_sender",
              "core.trading_engine",
              "core.risk_middleware",
              "controllers.dutching_controller",
              "app_modules.telegram_module",
              "main",
          ]

          failed = []

          for m in modules:
              try:
                  importlib.import_module(m)
                  print(f"[OK] {m}")
              except Exception as e:
                  print(f"[FAIL] {m} -> {e}")
                  failed.append(m)

          if failed:
              print("\nFAILED IMPORTS:")
              for m in failed:
                  print(m)
              sys.exit(1)
          PY

      - name: Run tests with strict coverage
        run: |
          xvfb-run -a pytest tests \
            -vv \
            --maxfail=1 \
            --disable-warnings \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=json \
            --cov-fail-under=70 \
            --ignore=tests/guardrails/test_contract_snapshot.py \
            --ignore=tests/test_concurrency_stress.py \
            --ignore=tests/test_dutching_safety.py \
            --ignore=tests/test_performance.py \
            --ignore=tests/test_dutching_advanced.py \
            --ignore=tests/test_liquidity_guard.py \
            --ignore=tests/test_new_components.py \
            --ignore=tests/test_simulation_mode.py \
            --ignore=tests/test_telemetry_indicator.py \
            --ignore=tests/test_toolbar_live.py \
            --ignore=tests/test_ui_components.py \
            --ignore=tests/test_market_selection_runtime.py \
            --ignore=tests/test_market_tracker_runtime_stream_flow.py \
            --ignore=tests/test_telegram_controller.py \
            --ignore=tests/test_e2e_app_startup_flow.py \
            --ignore=tests/test_e2e_cashout_flow.py \
            --ignore=tests/test_e2e_dutching_from_ui_flow.py \
            --ignore=tests/test_e2e_live_price_update_to_ui_flow.py \
            --ignore=tests/test_e2e_market_switching_runtime.py \
            --ignore=tests/test_e2e_multiple_telegram_signals_queue_flow.py \
            --ignore=tests/test_e2e_quick_bet_flow.py \
            --ignore=tests/test_e2e_quick_bet_then_cashout_flow.py \
            --ignore=tests/test_e2e_safe_mode_recovery_flow.py \
            --ignore=tests/test_e2e_safe_mode_recovery_ui_flow.py \
            --ignore=tests/test_e2e_telegram_to_order_flow.py \
            --ignore=tests/test_e2e_telegram_to_ui_to_order_flow.py \
            --ignore=tests/test_gui_manual_smoke.py \
            --ignore=tests/test_gui_runtime_state_flow.py \
            --ignore=tests/tests/test_e2e_market_selection_to_quick_bet.py

      - name: Mutation Testing
        continue-on-error: true
        run: |
          mutmut run || true

      - name: Debug coverage
        if: always()
        run: |
          ls -la
          if [ -f coverage.json ]; then
            head -n 200 coverage.json
          else
            echo "coverage.json non trovato"
          fi

      - name: Enforce critical coverage
        run: |
          python .github/scripts/check_per_file_coverage.py

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          if-no-files-found: warn
          path: |
            coverage.xml
            coverage.json

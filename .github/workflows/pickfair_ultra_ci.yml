name: Pickfair Ultra CI Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

env:
  PYTHON_VERSION: "3.11"
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: ${{ github.workspace }}

jobs:
  lint_static:
    name: Lint & Static Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit

      - name: Ruff Lint
        run: |
          ruff check .

      - name: Security scan
        run: |
          bandit -r . -x tests

  dependency_scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit dependencies
        run: |
          pip-audit

  import_smoke:
    name: Import Smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          python -m pip install telethon || true

      - name: Debug import environment
        run: |
          python - <<'PY'
          import os
          import sys

          print("cwd =", os.getcwd())
          print("python =", sys.executable)
          print("sys.path[0:10] =", sys.path[:10])
          print("ai exists =", os.path.isdir("ai"))
          print("ai/__init__.py exists =", os.path.isfile("ai/__init__.py"))
          print("ai/ai_guardrail.py exists =", os.path.isfile("ai/ai_guardrail.py"))
          PY

      - name: Import smoke
        run: |
          python - <<'PY'
          import importlib
          import sys

          modules = [
              "database",
              "dutching",
              "telegram_listener",
              "telegram_sender",
              "core.trading_engine",
              "core.risk_middleware",
              "controllers.dutching_controller",
              "app_modules.telegram_module",
              "main",
          ]

          failed = []

          for module_name in modules:
              try:
                  importlib.import_module(module_name)
                  print("[OK]", module_name)
              except Exception as e:
                  print("[FAIL]", module_name, "->", e)
                  failed.append(module_name)

          if failed:
              print("\nMODULES FAILED TO IMPORT:")
              for module_name in failed:
                  print(" -", module_name)
              sys.exit(1)
          PY

  full_tests:
    name: Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libx11-xcb1 libxrender1 libxext6 libx11-6 libgl1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio pytest-mock coverage[toml]
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          python -m pip install telethon || true

      - name: Run tests
        run: |
          xvfb-run -a pytest tests \
            -vv \
            --maxfail=1 \
            --durations=15 \
            --cov=. \
            --cov-report=term-missing

  performance_tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          python -m pip install telethon || true

      - name: Run performance tests
        run: |
          if [ -f tests/test_pickfair_ultra_speed.py ]; then
            pytest tests/test_pickfair_ultra_speed.py -vv
          else
            echo "SKIP: tests/test_pickfair_ultra_speed.py not found"
          fi

          if [ -f tests/test_pickfair_pipeline_latency.py ]; then
            pytest tests/test_pickfair_pipeline_latency.py -vv
          else
            echo "SKIP: tests/test_pickfair_pipeline_latency.py not found"
          fi

  stress_tests:
    name: HFT Stress Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          python -m pip install telethon || true

      - name: Run HFT stress tests
        run: |
          if [ -f tests/test_pickfair_hft_stress.py ]; then
            pytest tests/test_pickfair_hft_stress.py -vv
          else
            echo "SKIP: tests/test_pickfair_hft_stress.py not found"
          fi

  chaos_tests:
    name: Chaos Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          python -m pip install telethon || true

      - name: Run chaos tests
        run: |
          if [ -f tests/test_market_chaos_engine.py ]; then
            pytest tests/test_market_chaos_engine.py -vv
          else
            echo "SKIP: tests/test_market_chaos_engine.py not found"
          fi

  repo_autopsy:
    name: Repo Autopsy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Parse repo AST
        run: |
          python - <<'PY'
          import ast
          import os

          print("REPO AUTOPSY")

          for root, _, files in os.walk("."):
              if ".git" in root:
                  continue

              for filename in files:
                  if not filename.endswith(".py"):
                      continue

                  path = os.path.join(root, filename)

                  try:
                      with open(path, "r", encoding="utf-8") as fh:
                          src = fh.read()
                      ast.parse(src)
                      print("[OK]", path)
                  except Exception as e:
                      print("[ERROR]", path, e)
          PY

  repo_forensics:
    name: Repo Forensics
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Analyze functions
        run: |
          python - <<'PY'
          import ast
          import os

          print("REPO FORENSICS")

          for root, _, files in os.walk("."):
              if ".git" in root:
                  continue

              for filename in files:
                  if not filename.endswith(".py"):
                      continue

                  path = os.path.join(root, filename)

                  try:
                      with open(path, "r", encoding="utf-8") as fh:
                          src = fh.read()
                      tree = ast.parse(src)
                      funcs = [n.name for n in ast.walk(tree) if isinstance(n, ast.FunctionDef)]
                      print(path, len(funcs), "functions")
                  except Exception:
                      pass
          PY

  system_validation:
    name: System Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libx11-xcb1 libxrender1 libxext6 libx11-6 libgl1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-mock
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          python -m pip install telethon || true

      - name: Run system simulation
        run: |
          if [ -f tests/test_system_simulation.py ]; then
            xvfb-run -a pytest tests/test_system_simulation.py -vv
          else
            echo "SKIP: tests/test_system_simulation.py not found"
          fi

      - name: Run expanded system validation
        run: |
          if [ -f tests/test_system_expanded_validation.py ]; then
            xvfb-run -a pytest tests/test_system_expanded_validation.py -vv
          else
            echo "SKIP: tests/test_system_expanded_validation.py not found"
          fi

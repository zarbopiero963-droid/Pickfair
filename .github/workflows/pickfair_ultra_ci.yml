name: Pickfair Ultra CI Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

env:
  PYTHON_VERSION: "3.11"

jobs:

  lint_static:
    name: Lint & Static Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          python -m pip install --upgrade pip
          pip install ruff bandit

      - name: Ruff Lint
        run: |
          ruff check .

      - name: Security scan
        run: |
          bandit -r . -x tests

  dependency_scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - run: |
          pip-audit

  import_smoke:
    name: Import Smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          python - <<'PY'
          modules = [
              "database",
              "dutching",
              "telegram_listener",
              "telegram_sender",
              "core.trading_engine",
              "core.risk_middleware",
              "controllers.dutching_controller",
              "app_modules.telegram_module",
              "main"
          ]
          for m in modules:
              __import__(m)
              print("[OK]", m)
          PY

  full_tests:
    name: Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run tests
        run: |
          xvfb-run -a pytest tests \
            -vv \
            --maxfail=1 \
            --durations=15 \
            --cov=. \
            --cov-report=term-missing

  performance_tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - run: |
          if [ -f tests/test_pickfair_ultra_speed.py ]; then
            pytest tests/test_pickfair_ultra_speed.py -vv
          fi
          if [ -f tests/test_pickfair_pipeline_latency.py ]; then
            pytest tests/test_pickfair_pipeline_latency.py -vv
          fi

  stress_tests:
    name: HFT Stress Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - run: |
          if [ -f tests/test_pickfair_hft_stress.py ]; then
            pytest tests/test_pickfair_hft_stress.py -vv
          else
            echo "HFT stress tests not found"
          fi

  chaos_tests:
    name: Chaos Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - run: |
          if [ -f tests/test_market_chaos_engine.py ]; then
            pytest tests/test_market_chaos_engine.py -vv
          else
            echo "Chaos tests not found"
          fi

  repo_autopsy:
    name: Repo Autopsy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          python - <<'PY'
          import os
          import ast

          print("REPO AUTOPSY")

          for root, _, files in os.walk("."):
              if ".git" in root:
                  continue

              for f in files:
                  if not f.endswith(".py"):
                      continue

                  p = os.path.join(root, f)

                  try:
                      with open(p, "r", encoding="utf-8") as fh:
                          src = fh.read()
                      ast.parse(src)
                      print("[OK]", p)
                  except Exception as e:
                      print("[ERROR]", p, e)
          PY

  repo_forensics:
    name: Repo Forensics
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          python - <<'PY'
          import os
          import ast

          print("REPO FORENSICS")

          for root, _, files in os.walk("."):
              if ".git" in root:
                  continue

              for f in files:
                  if not f.endswith(".py"):
                      continue

                  path = os.path.join(root, f)

                  try:
                      with open(path, "r", encoding="utf-8") as fh:
                          src = fh.read()
                      tree = ast.parse(src)
                      funcs = [n.name for n in ast.walk(tree) if isinstance(n, ast.FunctionDef)]
                      print(path, len(funcs), "functions")
                  except Exception:
                      pass
          PY

  system_validation:
    name: System Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - run: |
          if [ -f tests/test_system_simulation.py ]; then
            xvfb-run -a pytest tests/test_system_simulation.py -vv
          fi

      - run: |
          if [ -f tests/test_system_expanded_validation.py ]; then
            xvfb-run -a pytest tests/test_system_expanded_validation.py -vv
          fi
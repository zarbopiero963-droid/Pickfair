name: Repo API Report V4

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  report:
    name: Generate Repository API Report V4
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run repository analyzer
        run: |
          python scripts/repo_api_report_v4.py

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: repo-api-report-v4
          path: |
            artifacts/repo_api_report_v4.json
            artifacts/repo_api_report_v4.md
            artifacts/repo_fix_priority_report.md
            artifacts/repo_api_report_v4_snapshot.json
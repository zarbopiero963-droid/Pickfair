name: Repo Autopsy Map

on:
  workflow_dispatch:
  push:
    branches: [ main, master, develop ]
    paths:
      - "**.py"
      - ".github/workflows/repo_autopsy.yml"
      - ".github/scripts/**"

jobs:
  autopsy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install networkx

      - name: Workspace snapshot
        run: |
          echo "==============================="
          echo "WORKSPACE FILES"
          echo "==============================="
          find . -maxdepth 4 -type f | sort

      - name: Run repo autopsy
        run: |
          echo "==============================="
          echo "STARTING REPO AUTOPSY"
          echo "==============================="
          python .github/scripts/generate_repo_autopsy.py
          echo "==============================="
          echo "REPO AUTOPSY COMPLETED"
          echo "==============================="

      - name: Print reports head
        if: always()
        run: |
          echo "==============================="
          echo "AUTOPSY SUMMARY JSON"
          echo "==============================="
          if [ -f autopsy/autopsy_summary.json ]; then
            python - <<'PY'
import json
from pathlib import Path
p = Path("autopsy/autopsy_summary.json")
data = json.loads(p.read_text(encoding="utf-8"))
print(json.dumps(data, indent=2)[:12000])
PY
          else
            echo "autopsy_summary.json non trovato"
          fi

          echo "==============================="
          echo "TOP CALL EDGES CSV HEAD"
          echo "==============================="
          if [ -f autopsy/call_edges.csv ]; then
            head -n 50 autopsy/call_edges.csv
          else
            echo "call_edges.csv non trovato"
          fi

      - name: Upload autopsy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-autopsy-artifacts
          path: |
            autopsy/
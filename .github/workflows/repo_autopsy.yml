name: Repo Autopsy CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  autopsy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libx11-xcb1 \
            libxrender1 \
            libxext6 \
            libx11-6 \
            libgl1 \
            graphviz

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            pip install pytest pytest-cov pytest-asyncio pytest-mock coverage[toml] ruff mypy mutmut
          fi

      - name: Static Analysis (RUFF)
        run: |
          echo "==============================="
          echo "STATIC ANALYSIS"
          echo "==============================="
          ruff check .
          echo "🟢 RUFF OK"

      - name: Type Checking (MYPY)
        run: |
          echo "==============================="
          echo "TYPE CHECK"
          echo "==============================="
          mypy . --ignore-missing-imports
          echo "🟢 MYPY OK"

      - name: Run tests with strict coverage
        run: |
          echo "==============================="
          echo "STARTING PYTEST"
          echo "==============================="

          xvfb-run -a pytest \
            -vv \
            --maxfail=1 \
            --disable-warnings \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=json \
            --cov-fail-under=90

          echo "🟢 TESTS OK"

      - name: Coverage debug
        if: always()
        run: |
          echo "==============================="
          echo "COVERAGE DEBUG"
          echo "==============================="

          ls -la

          if [ -f coverage.json ]; then
            echo "coverage.json trovato"
            python - <<'PY'
import json
from pathlib import Path
data=json.loads(Path("coverage.json").read_text())
print("FILES IN COVERAGE:",len(data.get("files",{})))
for i,f in enumerate(sorted(data.get("files",{}))[:30],1):
    print(i,f)
PY
          else
            echo "❌ coverage.json non trovato"
            exit 1

      - name: Critical Coverage Gate
        run: |
          echo "==============================="
          echo "CRITICAL FILE COVERAGE CHECK"
          echo "==============================="
          python .github/scripts/check_per_file_coverage.py

      - name: Mutation Testing
        run: |
          echo "==============================="
          echo "MUTATION TESTING"
          echo "==============================="
          mutmut run || true
          echo "MUTATION TESTING FINISHED"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-autopsy-report
          path: |
            coverage.xml
            coverage.json
            .mutmut-cache
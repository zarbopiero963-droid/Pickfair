name: Repo Autopsy CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  autopsy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libx11-xcb1 libxrender1 libxext6 libx11-6 libgl1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          pip install -r requirements-dev.txt

      - name: Static Analysis (RUFF)
        run: |
          echo "STATIC ANALYSIS"
          ruff check .

      - name: Type Checking (MYPY)
        run: |
          echo "TYPE CHECK"
          mypy . --ignore-missing-imports

      - name: Run tests
        run: |
          echo "RUNNING TESTS"

          xvfb-run -a pytest \
            -vv \
            --maxfail=1 \
            --disable-warnings \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=json \
            --cov-fail-under=90

      - name: Coverage Gate
        run: |
          python .github/scripts/check_per_file_coverage.py

      - name: Repo Autopsy Report
        run: |
          python .github/scripts/repo_autopsy.py

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-autopsy-report
          path: |
            coverage.xml
            coverage.json
            repo_autopsy_report.json
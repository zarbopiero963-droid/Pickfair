name: Repo Autopsy CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  autopsy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system UI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libx11-xcb1 libxrender1 libxext6 libx11-6 libgl1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            pip install pytest pytest-cov coverage[toml] pytest-asyncio pytest-mock ruff mypy
          fi

      - name: Static Analysis (Ruff)
        run: |
          echo "===================================="
          echo "STATIC ANALYSIS - RUFF"
          echo "===================================="

          if ruff check .; then
            echo "🟢 RUFF OK - nessun problema trovato"
          else
            echo "🔴 RUFF FAILED - problemi nel codice"
            exit 1
          fi

      - name: Type Checking (Mypy)
        run: |
          echo "===================================="
          echo "TYPE CHECK - MYPY"
          echo "===================================="

          if mypy . --ignore-missing-imports; then
            echo "🟢 MYPY OK - tipi validi"
          else
            echo "🔴 MYPY FAILED - errori di tipo"
            exit 1
          fi

      - name: Run tests with strict coverage
        run: |
          echo "===================================="
          echo "STARTING PYTEST EXECUTION"
          echo "===================================="

          xvfb-run -a pytest \
            -vv \
            --maxfail=1 \
            --disable-warnings \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=json \
            --cov-fail-under=90

          echo "===================================="
          echo "PYTEST COMPLETED"
          echo "===================================="
          echo "🟢 TESTS OK"

      - name: Print coverage files
        run: |
          echo "===================================="
          echo "COVERAGE FILES"
          echo "===================================="

          ls -la

          if [ -f coverage.json ]; then
            echo "🟢 coverage.json trovato"
            head -n 200 coverage.json
          else
            echo "🔴 coverage.json NON trovato"
            exit 1
          fi

      - name: Enforce 100% per critical file
        run: |
          echo "===================================="
          echo "CRITICAL COVERAGE GATE"
          echo "===================================="

          python .github/scripts/check_per_file_coverage.py

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            coverage.json
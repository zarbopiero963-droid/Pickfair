name: Repo Autopsy CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  autopsy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libx11-xcb1 \
            libxrender1 \
            libxext6 \
            libx11-6 \
            libgl1 \
            graphviz

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          pip install -r requirements-dev.txt

      - name: Static Analysis (RUFF)
        run: |
          echo "==============================="
          echo "STATIC ANALYSIS START"
          echo "==============================="
          ruff check .
          echo "==============================="
          echo "STATIC ANALYSIS OK"
          echo "==============================="

      - name: Type Checking (MYPY)
        run: |
          echo "==============================="
          echo "TYPE CHECK START"
          echo "==============================="
          mypy . --ignore-missing-imports
          echo "==============================="
          echo "TYPE CHECK OK"
          echo "==============================="

      - name: Run tests with strict coverage
        run: |
          echo "==============================="
          echo "STARTING PYTEST EXECUTION"
          echo "==============================="

          xvfb-run -a pytest \
            -vv \
            --maxfail=1 \
            --disable-warnings \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=json \
            --cov-fail-under=90

          echo "==============================="
          echo "PYTEST COMPLETED"
          echo "==============================="

      - name: Print coverage debug
        if: always()
        run: |
          echo "==============================="
          echo "COVERAGE DEBUG"
          echo "==============================="
          ls -la
          if [ -f coverage.json ]; then
            python - <<'PY'
import json
from pathlib import Path
p = Path("coverage.json")
data = json.loads(p.read_text(encoding="utf-8"))
print("coverage.json trovato")
print("numero file nel report:", len(data.get("files", {})))
for i, k in enumerate(sorted(data.get("files", {}).keys())[:30], start=1):
    print(f"{i:02d}. {k}")
PY
          else
            echo "coverage.json NON trovato"
            exit 1
          fi

      - name: Enforce 100% per critical files
        run: |
          echo "==============================="
          echo "CRITICAL COVERAGE GATE"
          echo "==============================="
          python .github/scripts/check_per_file_coverage.py

      - name: Repo Autopsy Report + Graphs
        run: |
          echo "==============================="
          echo "REPO AUTOPSY START"
          echo "==============================="
          python .github/scripts/repo_autopsy.py
          echo "==============================="
          echo "REPO AUTOPSY END"
          echo "==============================="

      - name: Mutation Testing
        run: |
          echo "==============================="
          echo "MUTATION TESTING"
          echo "==============================="
          mutmut run || true
          echo "==============================="
          echo "MUTATION TESTING FINISHED"
          echo "==============================="

      - name: Upload reports and graphs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-autopsy-report
          path: |
            coverage.xml
            coverage.json
            repo_autopsy_report.json
            repo_file_graph.dot
            repo_call_graph.dot
            repo_file_graph.svg
            repo_call_graph.svg
            .mutmut-cache
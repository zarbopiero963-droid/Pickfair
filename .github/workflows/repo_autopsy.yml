name: Repo Autopsy

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "**/*.py"
      - ".github/workflows/repo_autopsy.yml"

jobs:
  autopsy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run repository autopsy
        run: |
          python - <<'PY'
          import ast
          import os
          from collections import defaultdict, Counter

          print("="*80)
          print("REPO AUTOPSY START")
          print("="*80)

          py_files = []

          for base, _, files in os.walk("."):
              if any(x in base for x in [".git",".venv","venv","__pycache__",".pytest_cache"]):
                  continue
              for f in files:
                  if f.endswith(".py"):
                      py_files.append(os.path.join(base,f).replace("\\","/"))

          py_files = sorted(py_files)

          print(f"\nPython files detected: {len(py_files)}\n")

          for f in py_files:
              print("FILE:",f)

          imports_map = defaultdict(list)
          class_map = defaultdict(list)
          func_map = defaultdict(list)
          calls_map = defaultdict(list)

          dependency_edges = []

          parse_errors = []

          for path in py_files:
              try:
                  source=open(path,encoding="utf-8").read()
                  tree=ast.parse(source,filename=path)
              except Exception as e:
                  parse_errors.append((path,str(e)))
                  continue

              for node in ast.walk(tree):

                  if isinstance(node,ast.Import):
                      for alias in node.names:
                          imports_map[path].append(alias.name)
                          dependency_edges.append((path,alias.name))

                  elif isinstance(node,ast.ImportFrom):
                      mod=node.module or ""
                      imports_map[path].append(mod)
                      dependency_edges.append((path,mod))

                  elif isinstance(node,ast.ClassDef):
                      class_map[path].append(node.name)

                  elif isinstance(node,ast.FunctionDef):
                      func_map[path].append(node.name)

                  elif isinstance(node,ast.AsyncFunctionDef):
                      func_map[path].append(node.name)

                  elif isinstance(node,ast.Call):

                      name=None

                      if isinstance(node.func,ast.Name):
                          name=node.func.id
                      elif isinstance(node.func,ast.Attribute):
                          name=node.func.attr

                      if name:
                          calls_map[path].append(name)

          print("\n"+"="*80)
          print("PARSE ERRORS")
          print("="*80)

          if not parse_errors:
              print("No syntax errors detected")
          else:
              for p,e in parse_errors:
                  print("FAIL:",p)
                  print("ERROR:",e)

          print("\n"+"="*80)
          print("FILE STRUCTURE")
          print("="*80)

          for path in py_files:

              print("\nFILE:",path)

              print("Classes:",class_map.get(path,[]))
              print("Functions:",func_map.get(path,[]))
              print("Imports:",imports_map.get(path,[])[:40])

          centrality=Counter()

          for src,dst in dependency_edges:
              centrality[src]+=1
              centrality[dst]+=1

          print("\n"+"="*80)
          print("TOP CENTRAL FILES / MODULES")
          print("="*80)

          for node,score in centrality.most_common(40):
              print(f"{score:>5}",node)

          print("\n"+"="*80)
          print("FILES BY FUNCTION COUNT")
          print("="*80)

          func_rank=sorted(
              ((f,len(func_map.get(f,[]))) for f in py_files),
              key=lambda x:x[1],
              reverse=True
          )

          for f,c in func_rank[:40]:
              print(f"{c:>5}",f)

          print("\n"+"="*80)
          print("FILES BY CLASS COUNT")
          print("="*80)

          class_rank=sorted(
              ((f,len(class_map.get(f,[]))) for f in py_files),
              key=lambda x:x[1],
              reverse=True
          )

          for f,c in class_rank[:40]:
              print(f"{c:>5}",f)

          called=Counter()

          for v in calls_map.values():
              called.update(v)

          print("\n"+"="*80)
          print("MOST CALLED SYMBOLS")
          print("="*80)

          for name,count in called.most_common(80):
              print(f"{count:>5}",name)

          print("\n"+"="*80)
          print("REPO AUTOPSY END")
          print("="*80)

          PY
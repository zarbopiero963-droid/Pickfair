name: Repo Ultra Audit Narrative

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  ultra-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        shell: bash
        run: |
          set +e
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi
          pip install pytest requests telethon customtkinter
          set -e

      - name: Prepare output folders
        run: |
          mkdir -p audit_out
          mkdir -p audit_raw

      - name: Run deterministic repo audit
        run: |
          python .github/scripts/repo_ultra_audit_narrative.py
        continue-on-error: true

      - name: Run AI reasoning layer
        if: always()
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL_TRIAGE: qwen/qwen3-coder-next
          OPENROUTER_MODEL_REVIEW: openai/gpt-5.4
        run: |
          python .github/scripts/ai_reasoning_layer.py
        continue-on-error: true

      - name: Print deterministic report
        if: always()
        run: |
          echo ""
          echo "================ DETERMINISTIC AUDIT REPORT ================"
          cat audit_out/repo_ultra_audit_narrative.md || true
          echo "============================================================"
          echo ""

      - name: Print AI root cause
        if: always()
        run: |
          echo ""
          echo "================ AI ROOT CAUSE REPORT ======================="
          cat audit_out/root_cause.md || true
          echo "============================================================"
          echo ""

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-ultra-audit-${{ github.run_id }}
          path: |
            audit_out/**
            audit_raw/**
          if-no-files-found: warn
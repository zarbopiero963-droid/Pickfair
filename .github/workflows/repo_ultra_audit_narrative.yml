name: Repo Ultra Audit Narrative

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  actions: read
  pull-requests: write
  issues: write

concurrency:
  group: repo-ultra-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ultra-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        shell: bash
        run: |
          set +e
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi
          pip install pytest requests telethon customtkinter
          set -e

      - name: Prepare output folders
        run: |
          mkdir -p audit_out
          mkdir -p audit_raw
          mkdir -p audit_raw/external_ci_logs

      - name: Verify scripts exist
        run: |
          test -f .github/scripts/repo_ultra_audit_narrative.py
          test -f .github/scripts/extract_failing_tests.py
          test -f .github/scripts/ai_reasoning_layer.py
          test -f .github/scripts/build_priority_fix_order.py
          test -f .github/scripts/build_test_failure_context.py
          test -f .github/scripts/build_fix_context.py
          test -f .github/scripts/workflow_signal_aggregator.py
          test -f .github/scripts/openrouter_model_router.py
          test -f .github/scripts/patch_candidate_generator.py
          test -f .github/scripts/patch_verifier.py
          test -f .github/scripts/apply_patch_candidate.py
          test -f .github/scripts/post_patch_review.py
          test -f .github/scripts/build_merge_summary.py
          test -f .github/scripts/build_pr_comment.py
          test -f .github/scripts/ai_repair_loop.py
          test -f .github/scripts/run_targeted_tests.py
          test -f .github/scripts/repair_orchestrator.py
          test -f .github/scripts/merge_controller.py
          test -f .github/scripts/repair_memory.py
          test -f .github/scripts/issue_classifier.py
          test -f .github/scripts/ci_failure_aggregator.py
          test -f .github/scripts/load_repo_diagnostics.py
          test -f .github/scripts/test_gap_generator.py
          test -f .github/scripts/final_pr_gate.py
          test -f .github/scripts/ai_cto_layer.py
          echo "Scripts found."

      - name: Detect workflow mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "workflow_mode=pr_validation" >> "$GITHUB_OUTPUT"
            echo "Workflow mode: pr_validation"
          else
            echo "workflow_mode=full_repair" >> "$GITHUB_OUTPUT"
            echo "Workflow mode: full_repair"
          fi

      - name: Load AI Governance Docs
        if: always()
        run: |
          mkdir -p audit_raw
          if [ -f docs/REPO_RADIOGRAPHY.md ]; then
            cat docs/REPO_RADIOGRAPHY.md > audit_raw/ai_governance_context.md
          else
            : > audit_raw/ai_governance_context.md
          fi
          echo -e "\n\n---\n\n" >> audit_raw/ai_governance_context.md
          if [ -f docs/AI_RULEBOOK.md ]; then
            cat docs/AI_RULEBOOK.md >> audit_raw/ai_governance_context.md
          fi
          echo -e "\n\n---\n\n" >> audit_raw/ai_governance_context.md
          if [ -f docs/AI_AGENT_PROTOCOL.md ]; then
            cat docs/AI_AGENT_PROTOCOL.md >> audit_raw/ai_governance_context.md
          fi

      - name: Show AI governance context
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ AI GOVERNANCE CONTEXT ====================="
          if [ -f audit_raw/ai_governance_context.md ]; then
            head -c 4000 audit_raw/ai_governance_context.md || true
            echo ""
          else
            echo "ai_governance_context.md not found"
          fi
          echo "============================================================"

      - name: Build PR validation fallback state
        if: steps.mode.outputs.workflow_mode == 'pr_validation'
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          out = Path("audit_out")
          out.mkdir(parents=True, exist_ok=True)

          state = {
              "final_status": "pr_validation_mode",
              "repo_materially_greener": False,
              "repo_fully_green": False,
              "continuation_recommended": False,
              "next_action": "validate_existing_pr_only",
              "cycles": [],
          }

          report = "\n".join([
              "AI Repair Loop Report",
              "",
              "Final status: pr_validation_mode",
              "Max cycles: 0",
              "Repo materially greener: NO",
              "Repo fully green: NO",
              "Continuation recommended: NO",
              "Next action: validate_existing_pr_only",
              "",
              "This run was triggered by pull_request.",
              "Repair loop intentionally skipped to avoid generating a second patch on top of an existing AI patch PR.",
              "",
          ])

          (out / "ai_repair_loop_state.json").write_text(
              json.dumps(state, indent=2, ensure_ascii=False),
              encoding="utf-8",
          )
          (out / "ai_repair_loop_report.md").write_text(report, encoding="utf-8")
          print(report)
          PY

      - name: Discover existing AI PR
        if: always()
        id: existing_ai_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          output_path = Path(os.environ["GITHUB_OUTPUT"])

          result = subprocess.run(
              [
                  "gh", "pr", "list",
                  "--state", "open",
                  "--search", "AI automated patch in:title",
                  "--json", "number,headRefName,state"
              ],
              capture_output=True,
              text=True,
          )

          number = ""
          state = ""
          head = ""

          if result.returncode == 0:
              try:
                  items = json.loads(result.stdout or "[]")
              except Exception:
                  items = []

              if items:
                  first = items[0]
                  number = str(first.get("number", "")).strip()
                  state = str(first.get("state", "")).strip().lower()
                  head = str(first.get("headRefName", "")).strip()

          with output_path.open("a", encoding="utf-8") as f:
              f.write(f"number={number}\n")
              f.write(f"state={state}\n")
              f.write(f"head={head}\n")

          print(f"Existing AI PR number: {number or 'none'}")
          print(f"Existing AI PR state: {state or 'none'}")
          print(f"Existing AI PR head: {head or 'none'}")
          PY

      - name: Run deterministic repo audit
        if: always()
        run: |
          python .github/scripts/repo_ultra_audit_narrative.py
        continue-on-error: true

      - name: Extract failing tests
        if: always()
        run: |
          python .github/scripts/extract_failing_tests.py
        continue-on-error: true

      - name: AI reasoning layer
        if: always()
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL_TRIAGE: openai/gpt-5.4
          OPENROUTER_MODEL_REVIEW: openai/gpt-5.4
          OPENROUTER_MODEL_PATCH: openai/gpt-5.3-codex
          OPENROUTER_MODEL_CHEAP: qwen/qwen3-coder-next
          OPENROUTER_MODEL_HUGE_CONTEXT: google/gemini-3.1-pro-preview
        run: |
          python .github/scripts/ai_reasoning_layer.py
        continue-on-error: true

      - name: Build priority fix order
        if: always()
        run: |
          python .github/scripts/build_priority_fix_order.py
        continue-on-error: true

      - name: Collect repository diagnostics into audit_out
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p audit_out

          copy_first_match() {
            TARGET_NAME="$1"
            FOUND_PATH="$(find . -type f -name "$TARGET_NAME" \
              ! -path "./audit_out/*" \
              ! -path "./audit_raw/*" \
              | head -n 1)"

            if [ -n "$FOUND_PATH" ]; then
              cp "$FOUND_PATH" "audit_out/$TARGET_NAME"
              echo "FOUND: $FOUND_PATH -> audit_out/$TARGET_NAME"
            else
              echo "MISSING: $TARGET_NAME"
            fi
          }

          copy_first_match "repo_api_report_v4.json"
          copy_first_match "repo_autopsy_summary.json"
          copy_first_match "repo_autopsy.json"
          copy_first_match "repo_fix_backlog.json"
          copy_first_match "repo_fix_backlog_pretty.md"

          set -e

      - name: Show repository diagnostics files
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ REPOSITORY DIAGNOSTICS FILES =============="
          find audit_out -maxdepth 1 -type f \
            \( -name "repo_api_report_v4.json" \
            -o -name "repo_autopsy_summary.json" \
            -o -name "repo_autopsy.json" \
            -o -name "repo_fix_backlog.json" \
            -o -name "repo_fix_backlog_pretty.md" \) \
            | sort || true
          echo "============================================================"

      - name: Collect recent failed external CI logs into audit_raw
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          CURRENT_WORKFLOW: Repo Ultra Audit Narrative
          CURRENT_BRANCH: ${{ github.ref_name }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          out_dir = Path("audit_raw/external_ci_logs")
          out_dir.mkdir(parents=True, exist_ok=True)

          repo = os.environ["GH_REPO"]
          current_workflow = os.environ["CURRENT_WORKFLOW"]
          current_branch = os.environ["CURRENT_BRANCH"]

          wanted = {
              "Pickfair Ultra CI Pipeline",
              "Pickfair CI Pipeline",
              "AI Guardrails",
              "Full Test & Coverage Gate",
              "Full Test Suite",
              "tests.yml",
              "run_tests.yml",
              "Repo Update Engine ULTRA",
          }

          cmd = [
              "gh", "run", "list",
              "--repo", repo,
              "--branch", current_branch,
              "--limit", "30",
              "--json", "databaseId,name,conclusion,status,headBranch"
          ]
          result = subprocess.run(cmd, capture_output=True, text=True)

          if result.returncode != 0:
              print("Unable to query workflow runs.")
              print(result.stderr)
              raise SystemExit(0)

          try:
              runs = json.loads(result.stdout or "[]")
          except Exception:
              runs = []

          selected = []
          for run in runs:
              name = str(run.get("name", "")).strip()
              conclusion = str(run.get("conclusion", "")).strip().lower()

              if not name or name == current_workflow:
                  continue
              if name not in wanted:
                  continue
              if conclusion not in {"failure", "cancelled", "startup_failure", "timed_out", "action_required"}:
                  continue

              selected.append(run)

          selected = selected[:8]

          print(f"Selected failed external CI runs: {len(selected)}")

          for run in selected:
              run_id = str(run.get("databaseId", "")).strip()
              run_name = str(run.get("name", "")).strip()
              safe_name = "".join(c if c.isalnum() or c in ("-", "_") else "_" for c in run_name).strip("_")
              log_path = out_dir / f"{safe_name}_{run_id}.log"

              cmd = [
                  "gh", "run", "view", run_id,
                  "--repo", repo,
                  "--log"
              ]
              view = subprocess.run(cmd, capture_output=True, text=True)

              if view.returncode != 0:
                  fallback = (
                      f"Workflow: {run_name}\n"
                      f"Run ID: {run_id}\n"
                      f"Conclusion: {run.get('conclusion')}\n"
                      f"Status: {run.get('status')}\n"
                      f"Unable to fetch full logs.\n"
                      f"stderr:\n{view.stderr}\n"
                  )
                  log_path.write_text(fallback, encoding="utf-8")
                  continue

              content = (
                  f"Workflow: {run_name}\n"
                  f"Run ID: {run_id}\n"
                  f"Conclusion: {run.get('conclusion')}\n"
                  f"Status: {run.get('status')}\n\n"
                  f"{view.stdout}"
              )
              log_path.write_text(content, encoding="utf-8")

          print("External CI log collection completed.")
          PY

      - name: Show external CI log files
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ EXTERNAL CI LOG FILES ====================="
          if [ -d audit_raw/external_ci_logs ]; then
            find audit_raw/external_ci_logs -maxdepth 1 -type f | sort || true
          else
            echo "No external CI log directory."
          fi
          echo "============================================================"

      - name: Build CI failure context
        if: always()
        run: |
          python .github/scripts/ci_failure_aggregator.py
        continue-on-error: true

      - name: Show CI failure context
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ CI FAILURE CONTEXT ========================"
          if [ -f audit_out/ci_failure_context.json ]; then
            cat audit_out/ci_failure_context.json
          else
            echo "ci_failure_context.json not found"
          fi
          echo "============================================================"

      - name: Rebuild test failure context after CI ingestion
        if: always()
        run: |
          python .github/scripts/build_test_failure_context.py
        continue-on-error: true

      - name: Rebuild fix context after CI ingestion
        if: always()
        run: |
          python .github/scripts/build_fix_context.py
        continue-on-error: true

      - name: Show rebuilt fix context
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ REBUILT FIX CONTEXT ======================="
          if [ -f audit_out/fix_context.json ]; then
            cat audit_out/fix_context.json
          else
            echo "fix_context.json not found"
          fi
          echo "============================================================"

      - name: Load repo diagnostics
        if: always()
        run: |
          python .github/scripts/load_repo_diagnostics.py
        continue-on-error: true

      - name: Show repo diagnostics context
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ REPO DIAGNOSTICS CONTEXT =================="
          if [ -f audit_out/repo_diagnostics_context.json ]; then
            cat audit_out/repo_diagnostics_context.json
          else
            echo "repo_diagnostics_context.json not found"
          fi
          echo "============================================================"

      - name: Run AI CTO layer
        if: always()
        run: |
          python .github/scripts/ai_cto_layer.py
        continue-on-error: true

      - name: Show AI CTO layer output
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ AI CTO LAYER =============================="
          if [ -f audit_out/ai_cto_layer.json ]; then
            cat audit_out/ai_cto_layer.json
          else
            echo "ai_cto_layer.json not found"
          fi
          echo "============================================================"

      - name: Generate missing nominal tests from diagnostics
        if: always()
        run: |
          python .github/scripts/test_gap_generator.py
        continue-on-error: true

      - name: Show generated nominal tests report
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ TEST GAP GENERATION REPORT ================"
          if [ -f audit_out/test_gap_generation_report.json ]; then
            cat audit_out/test_gap_generation_report.json
          else
            echo "test_gap_generation_report.json not found"
          fi
          echo "============================================================"

      - name: Run issue classifier
        if: always()
        run: |
          python .github/scripts/issue_classifier.py
        continue-on-error: true

      - name: Show issue classification
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ ISSUE CLASSIFICATION ======================"
          if [ -f audit_out/issue_classification.json ]; then
            cat audit_out/issue_classification.json
          else
            echo "issue_classification.json not found"
          fi
          echo "============================================================"

      - name: Run repair memory filter
        if: always()
        run: |
          python .github/scripts/repair_memory.py
        continue-on-error: true

      - name: Show filtered fix context
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ FILTERED FIX CONTEXT ======================"
          if [ -f audit_out/filtered_fix_context.json ]; then
            cat audit_out/filtered_fix_context.json
          else
            echo "filtered_fix_context.json not found"
          fi
          echo "============================================================"

      - name: Build global workflow context
        if: always()
        run: |
          python .github/scripts/workflow_signal_aggregator.py
        continue-on-error: true

      - name: Show global workflow context
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ GLOBAL WORKFLOW CONTEXT ==================="
          if [ -f audit_out/global_workflow_context.md ]; then
            cat audit_out/global_workflow_context.md
          else
            echo "global_workflow_context.md not found"
          fi
          echo "============================================================"

      - name: Run targeted tests
        if: always()
        run: |
          python .github/scripts/run_targeted_tests.py
        continue-on-error: true

      - name: Show targeted test results
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ TARGETED TEST RESULTS ====================="
          if [ -f audit_out/targeted_test_results.md ]; then
            cat audit_out/targeted_test_results.md
          else
            echo "targeted_test_results.md not found"
          fi
          echo "============================================================"

      - name: Run AI repair loop
        if: steps.mode.outputs.workflow_mode == 'full_repair'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL_TRIAGE: openai/gpt-5.4
          OPENROUTER_MODEL_REVIEW: openai/gpt-5.4
          OPENROUTER_MODEL_PATCH: openai/gpt-5.3-codex
          OPENROUTER_MODEL_CHEAP: qwen/qwen3-coder-next
          OPENROUTER_MODEL_HUGE_CONTEXT: google/gemini-3.1-pro-preview
        run: |
          python .github/scripts/ai_repair_loop.py
        continue-on-error: true

      - name: Show repair loop report
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ AI REPAIR LOOP REPORT ====================="
          if [ -f audit_out/ai_repair_loop_report.md ]; then
            cat audit_out/ai_repair_loop_report.md
          else
            echo "ai_repair_loop_report.md not found"
          fi
          echo "============================================================"

      - name: Run repair orchestrator
        if: always()
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          EXISTING_AI_PR_NUMBER: ${{ steps.existing_ai_pr.outputs.number }}
          EXISTING_AI_PR_STATE: ${{ steps.existing_ai_pr.outputs.state }}
          EXISTING_AI_PR_HEAD: ${{ steps.existing_ai_pr.outputs.head }}
        run: |
          python .github/scripts/repair_orchestrator.py

      - name: Show repair orchestrator report
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ REPAIR ORCHESTRATOR ======================="
          if [ -f audit_out/repair_orchestrator_report.md ]; then
            cat audit_out/repair_orchestrator_report.md
          else
            echo "repair_orchestrator_report.md not found"
          fi
          echo "============================================================"

      - name: Show self-healing status
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("audit_out/repair_orchestrator_state.json")
          if not path.exists():
              print("Repo materially greener: UNKNOWN")
              print("Repo fully green: UNKNOWN")
              print("Continuation recommended: UNKNOWN")
              print("Next action: unknown")
              raise SystemExit(0)

          data = json.loads(path.read_text(encoding="utf-8"))

          print(f"Repo materially greener: {'YES' if data.get('repo_materially_greener') else 'NO'}")
          print(f"Repo fully green: {'YES' if data.get('repo_fully_green') else 'NO'}")
          print(f"Continuation recommended: {'YES' if data.get('continuation_recommended') else 'NO'}")
          print(f"Next action: {data.get('next_action', 'unknown')}")
          print(f"Orchestrator action: {data.get('action', 'unknown')}")
          PY

      - name: Show deterministic report file
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ DETERMINISTIC AUDIT REPORT ================"
          if [ -f audit_out/repo_ultra_audit_narrative.md ]; then
            cat audit_out/repo_ultra_audit_narrative.md
          else
            echo "repo_ultra_audit_narrative.md not found"
          fi
          echo "============================================================"

      - name: Show deterministic machine file
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ DETERMINISTIC MACHINE JSON ================"
          if [ -f audit_out/audit_machine.json ]; then
            cat audit_out/audit_machine.json
          else
            echo "audit_machine.json not found"
          fi
          echo "============================================================"

      - name: Show failing tests
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ FAILING TESTS ============================="
          if [ -f audit_out/failing_tests.json ]; then
            cat audit_out/failing_tests.json
          else
            echo "failing_tests.json not found"
          fi
          echo "============================================================"

      - name: Show AI root cause
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ ROOT CAUSE ================================"
          if [ -f audit_out/root_cause.md ]; then
            cat audit_out/root_cause.md
          else
            echo "root_cause.md not found"
          fi
          echo "============================================================"

      - name: Show AI fix suggestions
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ FIX SUGGESTIONS ==========================="
          if [ -f audit_out/fix_suggestions.md ]; then
            cat audit_out/fix_suggestions.md
          else
            echo "fix_suggestions.md not found"
          fi
          echo "============================================================"

      - name: Show priority fix order
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ PRIORITY FIX ORDER ========================"
          if [ -f audit_out/priority_fix_order.md ]; then
            cat audit_out/priority_fix_order.md
          else
            echo "priority_fix_order.md not found"
          fi
          echo "============================================================"

      - name: Show test failure context
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ TEST FAILURE CONTEXT ======================"
          if [ -f audit_out/test_failure_context.json ]; then
            cat audit_out/test_failure_context.json
          else
            echo "test_failure_context.json not found"
          fi
          echo "============================================================"

      - name: Show patch candidate
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ PATCH CANDIDATE ==========================="
          if [ -f audit_out/patch_candidate.md ]; then
            cat audit_out/patch_candidate.md
          else
            echo "patch_candidate.md not found"
          fi
          echo "============================================================"

      - name: Show patch verification
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ PATCH VERIFICATION ========================"
          if [ -f audit_out/patch_verification.md ]; then
            cat audit_out/patch_verification.md
          else
            echo "patch_verification.md not found"
          fi
          echo "============================================================"

      - name: Show patch apply report
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ PATCH APPLY REPORT ========================"
          if [ -f audit_out/patch_apply_report.md ]; then
            cat audit_out/patch_apply_report.md
          else
            echo "patch_apply_report.md not found"
          fi
          echo "============================================================"

      - name: Show post patch review
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ POST PATCH REVIEW ========================="
          if [ -f audit_out/post_patch_review.md ]; then
            cat audit_out/post_patch_review.md
          else
            echo "post_patch_review.md not found"
          fi
          echo "============================================================"

      - name: Run merge controller
        if: always()
        run: |
          python .github/scripts/merge_controller.py
        continue-on-error: true

      - name: Show merge controller report
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ MERGE CONTROLLER =========================="
          if [ -f audit_out/merge_controller_report.md ]; then
            cat audit_out/merge_controller_report.md
          else
            echo "merge_controller_report.md not found"
          fi
          echo "============================================================"

      - name: Build merge summary
        if: always()
        run: |
          python .github/scripts/build_merge_summary.py
        continue-on-error: true

      - name: Show merge summary
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ MERGE SUMMARY ============================="
          if [ -f audit_out/merge_summary.md ]; then
            cat audit_out/merge_summary.md
          else
            echo "merge_summary.md not found"
          fi
          echo "============================================================"

      - name: Build PR comment files
        if: always()
        run: |
          python .github/scripts/build_pr_comment.py
        continue-on-error: true

      - name: Show PR comment preview
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ PR COMMENT PREVIEW ========================"
          if [ -f audit_out/pr_comment.md ]; then
            cat audit_out/pr_comment.md
          else
            echo "pr_comment.md not found"
          fi
          echo "============================================================"

      - name: Final PR gate
        if: steps.mode.outputs.workflow_mode == 'full_repair'
        id: pr_gate
        run: |
          python .github/scripts/final_pr_gate.py

      - name: Create AI repair PR
        if: steps.mode.outputs.workflow_mode == 'full_repair' && steps.pr_gate.outputs.allow_pr == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "AI repair patch"
          title: "AI Repair Patch"
          body: |
            Automated repair generated by pipeline.

            Reason: ${{ steps.pr_gate.outputs.reason }}
          branch: ai-repair
          add-paths: |
            *.py
            tests/**/*.py
            .github/scripts/**/*.py

      - name: Enable auto merge
        if: steps.mode.outputs.workflow_mode == 'full_repair' && steps.pr_gate.outputs.auto_merge == 'true'
        run: |
          gh pr merge --auto --squash ai-repair
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-ultra-audit-${{ github.run_id }}
          path: |
            audit_out/**
            audit_raw/**
            tests/generated/**
          if-no-files-found: warn
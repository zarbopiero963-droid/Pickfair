name: Repo Ultra Audit Narrative

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  ultra-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        shell: bash
        run: |
          set +e
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi
          pip install pytest requests telethon customtkinter
          set -e

      - name: Prepare output folders
        run: |
          mkdir -p audit_out
          mkdir -p audit_raw

      - name: Verify scripts exist
        run: |
          test -f .github/scripts/repo_ultra_audit_narrative.py
          test -f .github/scripts/ai_reasoning_layer.py
          test -f .github/scripts/build_priority_fix_order.py
          test -f .github/scripts/build_fix_context.py
          test -f .github/scripts/openrouter_model_router.py
          test -f .github/scripts/workflow_signal_aggregator.py
          test -f .github/scripts/patch_candidate_generator.py
          echo "Scripts found."

      - name: Run deterministic repo audit
        run: |
          python .github/scripts/repo_ultra_audit_narrative.py
        continue-on-error: true

      - name: Inspect deterministic outputs
        if: always()
        shell: bash
        run: |
          echo "================ audit_out ================="
          ls -R audit_out || true
          echo "================ audit_raw ================="
          ls -R audit_raw || true
          echo "============================================"

      - name: Show deterministic report file
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ DETERMINISTIC AUDIT REPORT ================"
          if [ -f audit_out/repo_ultra_audit_narrative.md ]; then
            cat audit_out/repo_ultra_audit_narrative.md
          else
            echo "repo_ultra_audit_narrative.md not found"
          fi
          echo "============================================================"
          echo ""

      - name: Show deterministic machine file
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ DETERMINISTIC MACHINE JSON ================"
          if [ -f audit_out/audit_machine.json ]; then
            cat audit_out/audit_machine.json
          else
            echo "audit_machine.json not found"
          fi
          echo "============================================================"
          echo ""

      - name: Load AI Governance Docs
        if: always()
        run: |
          mkdir -p audit_raw

          echo "Loading AI governance docs..."

          cat docs/REPO_RADIOGRAPHY.md > audit_raw/ai_governance_context.md
          echo -e "\n\n---\n\n" >> audit_raw/ai_governance_context.md

          cat docs/AI_RULEBOOK.md >> audit_raw/ai_governance_context.md
          echo -e "\n\n---\n\n" >> audit_raw/ai_governance_context.md

          if [ -f docs/AI_AGENT_PROTOCOL.md ]; then
            cat docs/AI_AGENT_PROTOCOL.md >> audit_raw/ai_governance_context.md
          fi

          echo "AI governance context prepared."

      - name: Show AI governance context
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ AI GOVERNANCE CONTEXT ====================="
          if [ -f audit_raw/ai_governance_context.md ]; then
            head -c 4000 audit_raw/ai_governance_context.md || true
            echo ""
          else
            echo "ai_governance_context.md not found"
          fi
          echo "============================================================"
          echo ""

      - name: Run AI reasoning layer
        if: always()
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL_TRIAGE: openai/gpt-5.4
          OPENROUTER_MODEL_REVIEW: openai/gpt-5.4
          OPENROUTER_MODEL_PATCH: openai/gpt-5.3-codex
          OPENROUTER_MODEL_CHEAP: qwen/qwen3-coder-next
          OPENROUTER_MODEL_HUGE_CONTEXT: google/gemini-3.1-pro-preview
        run: |
          python .github/scripts/ai_reasoning_layer.py
        continue-on-error: true

      - name: Show AI root cause
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ AI ROOT CAUSE REPORT ======================"
          if [ -f audit_out/root_cause.md ]; then
            cat audit_out/root_cause.md
          else
            echo "root_cause.md not found"
          fi
          echo "============================================================"
          echo ""

      - name: Show AI fix suggestions
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ AI FIX SUGGESTIONS ========================"
          if [ -f audit_out/fix_suggestions.md ]; then
            cat audit_out/fix_suggestions.md
          else
            echo "fix_suggestions.md not found"
          fi
          echo "============================================================"
          echo ""

      - name: Show AI targeted tests
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ AI TARGETED TESTS ========================="
          if [ -f audit_out/targeted_tests.md ]; then
            cat audit_out/targeted_tests.md
          else
            echo "targeted_tests.md not found"
          fi
          echo "============================================================"
          echo ""

      - name: Build priority fix order
        if: always()
        run: |
          python .github/scripts/build_priority_fix_order.py
        continue-on-error: true

      - name: Show priority fix order
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ PRIORITY FIX ORDER ========================"
          if [ -f audit_out/priority_fix_order.md ]; then
            cat audit_out/priority_fix_order.md
          else
            echo "priority_fix_order.md not found"
          fi
          echo "============================================================"
          echo ""

      - name: Build fix context
        if: always()
        run: |
          python .github/scripts/build_fix_context.py
        continue-on-error: true

      - name: Show fix context
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ FIX CONTEXT ==============================="
          if [ -f audit_out/fix_context.json ]; then
            cat audit_out/fix_context.json
          else
            echo "fix_context.json not found"
          fi
          echo "============================================================"
          echo ""

      - name: Build global workflow context
        if: always()
        run: |
          python .github/scripts/workflow_signal_aggregator.py
        continue-on-error: true

      - name: Show global workflow context
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ GLOBAL WORKFLOW CONTEXT ==================="
          if [ -f audit_out/global_workflow_context.md ]; then
            cat audit_out/global_workflow_context.md
          else
            echo "global_workflow_context.md not found"
          fi
          echo "============================================================"
          echo ""

      - name: Generate patch candidate
        if: always()
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL_TRIAGE: openai/gpt-5.4
          OPENROUTER_MODEL_REVIEW: openai/gpt-5.4
          OPENROUTER_MODEL_PATCH: openai/gpt-5.3-codex
          OPENROUTER_MODEL_CHEAP: qwen/qwen3-coder-next
          OPENROUTER_MODEL_HUGE_CONTEXT: google/gemini-3.1-pro-preview
        run: |
          python .github/scripts/patch_candidate_generator.py
        continue-on-error: true

      - name: Show patch candidate
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ PATCH CANDIDATE ==========================="
          if [ -f audit_out/patch_candidate.md ]; then
            cat audit_out/patch_candidate.md
          else
            echo "patch_candidate.md not found"
          fi
          echo "============================================================"
          echo ""

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-ultra-audit-${{ github.run_id }}
          path: |
            audit_out/**
            audit_raw/**
          if-no-files-found: warn
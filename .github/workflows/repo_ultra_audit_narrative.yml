name: Repo Ultra Audit Narrative

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  actions: read
  pull-requests: write
  issues: write

concurrency:
  group: repo-ultra-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ultra-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        shell: bash
        run: |
          set +e
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi
          pip install pytest requests telethon customtkinter
          set -e

      - name: Prepare output folders
        run: |
          mkdir -p audit_out
          mkdir -p audit_raw

      - name: Verify scripts exist
        run: |
          test -f .github/scripts/repo_ultra_audit_narrative.py
          test -f .github/scripts/extract_failing_tests.py
          test -f .github/scripts/ai_reasoning_layer.py
          test -f .github/scripts/build_priority_fix_order.py
          test -f .github/scripts/build_test_failure_context.py
          test -f .github/scripts/build_fix_context.py
          test -f .github/scripts/workflow_signal_aggregator.py
          test -f .github/scripts/openrouter_model_router.py
          test -f .github/scripts/patch_candidate_generator.py
          test -f .github/scripts/patch_verifier.py
          test -f .github/scripts/apply_patch_candidate.py
          test -f .github/scripts/post_patch_review.py
          test -f .github/scripts/build_merge_summary.py
          test -f .github/scripts/build_pr_comment.py
          test -f .github/scripts/ai_repair_loop.py
          test -f .github/scripts/run_targeted_tests.py
          echo "Scripts found."

      - name: Load AI Governance Docs
        if: always()
        run: |
          mkdir -p audit_raw
          cat docs/REPO_RADIOGRAPHY.md > audit_raw/ai_governance_context.md
          echo -e "\n\n---\n\n" >> audit_raw/ai_governance_context.md
          cat docs/AI_RULEBOOK.md >> audit_raw/ai_governance_context.md
          echo -e "\n\n---\n\n" >> audit_raw/ai_governance_context.md
          if [ -f docs/AI_AGENT_PROTOCOL.md ]; then
            cat docs/AI_AGENT_PROTOCOL.md >> audit_raw/ai_governance_context.md
          fi

      - name: Show AI governance context
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ AI GOVERNANCE CONTEXT ====================="
          if [ -f audit_raw/ai_governance_context.md ]; then
            head -c 4000 audit_raw/ai_governance_context.md || true
            echo ""
          else
            echo "ai_governance_context.md not found"
          fi
          echo "============================================================"

      - name: Run AI repair loop
        if: always()
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL_TRIAGE: openai/gpt-5.4
          OPENROUTER_MODEL_REVIEW: openai/gpt-5.4
          OPENROUTER_MODEL_PATCH: openai/gpt-5.3-codex
          OPENROUTER_MODEL_CHEAP: qwen/qwen3-coder-next
          OPENROUTER_MODEL_HUGE_CONTEXT: google/gemini-3.1-pro-preview
        run: |
          python .github/scripts/ai_repair_loop.py
        continue-on-error: true

      - name: Show repair loop report
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ AI REPAIR LOOP REPORT ====================="
          if [ -f audit_out/ai_repair_loop_report.md ]; then
            cat audit_out/ai_repair_loop_report.md
          else
            echo "ai_repair_loop_report.md not found"
          fi
          echo "============================================================"

      - name: Show self-healing status
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("audit_out/ai_repair_loop_state.json")
          if not path.exists():
              print("Repo materially greener: UNKNOWN")
              print("Repo fully green: UNKNOWN")
              print("Continuation recommended: UNKNOWN")
              print("Next action: unknown")
              raise SystemExit(0)

          data = json.loads(path.read_text(encoding="utf-8"))

          print(f"Repo materially greener: {'YES' if data.get('repo_materially_greener') else 'NO'}")
          print(f"Repo fully green: {'YES' if data.get('repo_fully_green') else 'NO'}")
          print(f"Continuation recommended: {'YES' if data.get('continuation_recommended') else 'NO'}")
          print(f"Next action: {data.get('next_action', 'unknown')}")
          PY

      - name: Show deterministic report file
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ DETERMINISTIC AUDIT REPORT ================"
          if [ -f audit_out/repo_ultra_audit_narrative.md ]; then
            cat audit_out/repo_ultra_audit_narrative.md
          else
            echo "repo_ultra_audit_narrative.md not found"
          fi
          echo "============================================================"

      - name: Show deterministic machine file
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ DETERMINISTIC MACHINE JSON ================"
          if [ -f audit_out/audit_machine.json ]; then
            cat audit_out/audit_machine.json
          else
            echo "audit_machine.json not found"
          fi
          echo "============================================================"

      - name: Show failing tests
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ FAILING TESTS ============================="
          if [ -f audit_out/failing_tests.json ]; then
            cat audit_out/failing_tests.json
          else
            echo "failing_tests.json not found"
          fi
          echo "============================================================"

      - name: Show targeted test results
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ TARGETED TEST RESULTS ====================="
          if [ -f audit_out/targeted_test_results.md ]; then
            cat audit_out/targeted_test_results.md
          else
            echo "targeted_test_results.md not found"
          fi
          echo "============================================================"

      - name: Show AI root cause
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ ROOT CAUSE ================================"
          if [ -f audit_out/root_cause.md ]; then
            cat audit_out/root_cause.md
          else
            echo "root_cause.md not found"
          fi
          echo "============================================================"

      - name: Show AI fix suggestions
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ FIX SUGGESTIONS ==========================="
          if [ -f audit_out/fix_suggestions.md ]; then
            cat audit_out/fix_suggestions.md
          else
            echo "fix_suggestions.md not found"
          fi
          echo "============================================================"

      - name: Show priority fix order
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ PRIORITY FIX ORDER ========================"
          if [ -f audit_out/priority_fix_order.md ]; then
            cat audit_out/priority_fix_order.md
          else
            echo "priority_fix_order.md not found"
          fi
          echo "============================================================"

      - name: Show test failure context
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ TEST FAILURE CONTEXT ======================"
          if [ -f audit_out/test_failure_context.json ]; then
            cat audit_out/test_failure_context.json
          else
            echo "test_failure_context.json not found"
          fi
          echo "============================================================"

      - name: Show fix context
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ FIX CONTEXT ==============================="
          if [ -f audit_out/fix_context.json ]; then
            cat audit_out/fix_context.json
          else
            echo "fix_context.json not found"
          fi
          echo "============================================================"

      - name: Show global workflow context
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ GLOBAL WORKFLOW CONTEXT ==================="
          if [ -f audit_out/global_workflow_context.md ]; then
            cat audit_out/global_workflow_context.md
          else
            echo "global_workflow_context.md not found"
          fi
          echo "============================================================"

      - name: Show patch candidate
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ PATCH CANDIDATE ==========================="
          if [ -f audit_out/patch_candidate.md ]; then
            cat audit_out/patch_candidate.md
          else
            echo "patch_candidate.md not found"
          fi
          echo "============================================================"

      - name: Show patch verification
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ PATCH VERIFICATION ========================"
          if [ -f audit_out/patch_verification.md ]; then
            cat audit_out/patch_verification.md
          else
            echo "patch_verification.md not found"
          fi
          echo "============================================================"

      - name: Show patch apply report
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ PATCH APPLY REPORT ========================"
          if [ -f audit_out/patch_apply_report.md ]; then
            cat audit_out/patch_apply_report.md
          else
            echo "patch_apply_report.md not found"
          fi
          echo "============================================================"

      - name: Show post patch review
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ POST PATCH REVIEW ========================="
          if [ -f audit_out/post_patch_review.md ]; then
            cat audit_out/post_patch_review.md
          else
            echo "post_patch_review.md not found"
          fi
          echo "============================================================"

      - name: Evaluate final PR gate
        if: always()
        id: review_gate
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          post_path = Path("audit_out/post_patch_review.json")
          apply_path = Path("audit_out/patch_apply_report.json")
          loop_path = Path("audit_out/ai_repair_loop_state.json")
          verification_path = Path("audit_out/patch_verification.json")

          allow_pr = "false"
          reason = "unknown"

          if not loop_path.exists():
              reason = "missing_ai_repair_loop_state"
          elif not post_path.exists():
              reason = "missing_post_patch_review"
          elif not apply_path.exists():
              reason = "missing_patch_apply_report"
          elif not verification_path.exists():
              reason = "missing_patch_verification"
          else:
              loop_state = json.loads(loop_path.read_text(encoding="utf-8"))
              post = json.loads(post_path.read_text(encoding="utf-8"))
              apply_report = json.loads(apply_path.read_text(encoding="utf-8"))
              verification = json.loads(verification_path.read_text(encoding="utf-8"))

              verdict = str(post.get("final_verdict", "")).strip().lower()
              verifier = str(verification.get("verdict", "")).strip().lower()
              applied = bool(apply_report.get("applied", False))
              greener = bool(loop_state.get("repo_materially_greener", False))

              reviewable = (
                  applied
                  and verifier in {"approve", "weak-approve"}
                  and verdict != "reject"
              )

              if reviewable:
                  allow_pr = "true"
                  if greener:
                      reason = loop_state.get("next_action", "improved_and_applied")
                  else:
                      reason = "reviewable_fix_pr"
              elif verdict == "reject":
                  reason = "post_patch_review_reject"
              elif not applied:
                  reason = "patch_not_applied"
              else:
                  reason = "not_reviewable"

          print(f"allow_pr={allow_pr}")
          print(f"gate_reason={reason}")

          with output_path.open("a", encoding="utf-8") as f:
              f.write(f"allow_pr={allow_pr}\n")
              f.write(f"gate_reason={reason}\n")
          PY

      - name: Build merge summary
        if: always()
        run: |
          python .github/scripts/build_merge_summary.py
        continue-on-error: true

      - name: Show merge summary
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ MERGE SUMMARY ============================="
          if [ -f audit_out/merge_summary.md ]; then
            cat audit_out/merge_summary.md
          else
            echo "merge_summary.md not found"
          fi
          echo "============================================================"

      - name: Build PR comment files
        if: always()
        run: |
          python .github/scripts/build_pr_comment.py
        continue-on-error: true

      - name: Show PR comment preview
        if: always()
        shell: bash
        run: |
          echo ""
          echo "================ PR COMMENT PREVIEW ========================"
          if [ -f audit_out/pr_comment.md ]; then
            cat audit_out/pr_comment.md
          else
            echo "pr_comment.md not found"
          fi
          echo "============================================================"

      - name: Fail workflow if final gate is not approved
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.review_gate.outputs.allow_pr }}" != "true" ]; then
            echo "Final PR gate blocked. Reason: ${{ steps.review_gate.outputs.gate_reason }}"
            exit 1
          fi
          echo "Final PR gate approved."

      - name: Create AI fix branch
        if: always() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && steps.review_gate.outputs.allow_pr == 'true'
        id: create_ai_branch
        shell: bash
        run: |
          BRANCH="ai-fix-${{ github.run_id }}"
          echo "ai_branch=$BRANCH" >> "$GITHUB_OUTPUT"

          git config --global user.name "repo-ai-bot"
          git config --global user.email "ai-bot@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No staged changes detected, skipping branch creation"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Creating branch $BRANCH"
          git checkout -B "$BRANCH"
          git commit -m "AI automated patch candidate"
          git push --force-with-lease origin "$BRANCH"

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Create or update Pull Request
        if: always() && github.event_name != 'pull_request' && steps.create_ai_branch.outputs.has_changes == 'true'
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_BRANCH: ${{ steps.create_ai_branch.outputs.ai_branch }}
        shell: bash
        run: |
          set -e

          EXISTING="$(gh pr list --head "$AI_BRANCH" --json number --jq '.[0].number')"

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Existing PR found: #$EXISTING"
            gh pr edit "$EXISTING" --title "AI automated patch" --body-file audit_out/pr_body.md
            echo "pr_number=$EXISTING" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          URL="$(gh pr create --base main --head "$AI_BRANCH" --title "AI automated patch" --body-file audit_out/pr_body.md)"
          NUMBER="${URL##*/}"

          echo "Created PR #$NUMBER"
          echo "pr_number=$NUMBER" >> "$GITHUB_OUTPUT"

      - name: Post AI comment to PR
        if: always() && github.event_name != 'pull_request' && steps.create_pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pr_number }}
        shell: bash
        run: |
          gh pr comment "$PR_NUMBER" --body-file audit_out/pr_comment.md

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-ultra-audit-${{ github.run_id }}
          path: |
            audit_out/**
            audit_raw/**
          if-no-files-found: warn 